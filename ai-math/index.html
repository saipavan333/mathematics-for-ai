code:`import numpy as np

# Exponent rules
print(2**3 * 2**4)   # 128 = 2^7  (product rule)
print((2**3)**2)     # 64  = 2^6  (power rule)

print(2**-3)         # 0.125      (negative exponent)

# Softmax: exponents + fractions
def softmax(z, T=1.0):
    e = np.exp(z / T)
    return e / e.sum()

z = np.array([2.0, 1.0, 0.1])
print(softmax(z))          # [0.659 0.242 0.099] sums to 1
print(softmax(z, T=0.1))   # sharper (low T)

dd:`<div class="ddw"><h3>Why Base \\(e\\) and Not 2 or 10?</h3><p>The exponential \\(e^x\\) is the unique function that is its own derivative: \\((e^x)'=e^x\\). This makes \\(d/dx\\,\\ln x=1/x\\) — the simplest possible form. Using base 10 would give \\(d/dx\\,\\log_{10}x=1/(x\\ln10)\\), cluttering every gradient with \\(\\ln10\\approx2.303\\). The choice of \\(e\\) is not convention — it's the only base where calculus works out cleanly. Every PyTorch <code>torch.log</code> and NumPy <code>np.log</code> is the natural log. When an ML paper writes \\(\\log\\) without a base, it means \\(\\ln\\).</p></div>`

["Product rule","Let \\(\\log_b x=m\\) and \\(\\log_b y=n\\), so \\(b^m=x,b^n=y\\). Then \\(xy=b^m\\cdot b^n=b^{m+n}\\). Taking \\(\\log_b\\): \\(\\log_b(xy)=m+n=\\log_b x+\\log_b y\\). ∎"],
["Power rule","\\(x^n=x\\cdot x\\cdots x\\) (\\(n\\) times). Apply product rule \\(n\\) times: \\(\\log(x^n)=n\\log x\\)."],
["Change of base","Let \\(y=\\log_b x\\), so \\(b^y=x\\). Take \\(\\ln\\): \\(y\\ln b=\\ln x\\). Solve: \\(y=\\ln x/\\ln b\\)."],
["Log-sum-exp stability","Naive \\(\\log\\sum_i e^{z_i}\\) overflows for large \\(z\\). Let \\(m=\\max_i z_i\\). Then \\(\\log\\sum_i e^{z_i}=m+\\log\\sum_i e^{z_i-m}\\). The shifted values \\(z_i-m\\le0\\) so \\(e^{z_i-m}\\le1\\): no overflow."],
["Cross-entropy from NLL","Minimize the negative log-likelihood: \\(-\\sum_i\\log P(y_i|x_i)\\). For a categorical model outputting \\(\\hat p\\), this is \\(-\\log\\hat p_{y_i}\\) averaged over samples. That's cross-entropy loss."]
],
code:`import numpy as np

# Log rules
print(np.log(6))             # ln(2×3)
print(np.log(2)+np.log(3))  # same: ln2 + ln3

# Log-space multiplication avoids underflow
probs = [0.9, 0.8, 0.7, 0.6, 0.5]
print(np.prod(probs))                     # may underflow for long seqs
print(np.exp(sum(np.log(p) for p in probs)))  # identical, safe

# Numerically stable log-sum-exp
def lse(z):
    m = z.max()
    return m + np.log(np.sum(np.exp(z - m)))

z = np.array([1000., 1001., 1002.])
# np.log(np.sum(np.exp(z)))  → would overflow!
print(lse(z))   # 1002.407... (correct)

# Cross-entropy loss = -log(correct class probability)
def ce_loss(y_true, probs):
    return -np.log(probs[y_true] + 1e-9)

probs = np.array([0.7, 0.2, 0.1])
print(ce_loss(0, probs))   # -log(0.7) ≈ 0.357`,

dd:`<div class="ddw"><h3>Natural Log as Area Under \\(1/x\\)</h3><p>There is a beautiful geometric definition: \\(\\ln x = \\int_1^x \\frac{1}{t}\\,dt\\). This is the area under the curve \\(y=1/t\\) from 1 to \\(x\\). When \\(x>1\\) the area is positive; when \\(x<1\\) it is negative (integral from right to left). The product rule follows immediately: \\(\\ln(xy)=\\int_1^{xy}1/t\\,dt=\\int_1^x1/t\\,dt+\\int_x^{xy}1/t\\,dt\\). In the second integral, substitute \\(u=t/x\\): \\(\\int_1^y1/u\\,du=\\ln y\\). So \\(\\ln(xy)=\\ln x+\\ln y\\) without needing the exponential at all.</p></div>`

<div class="fr"><span class="fl">Function</span>\\(f:A\\to B\\) — exactly one output per input</div>

<div class="fr"><span class="fl">Range</span>\\(\\text{Im}(f)=\\{f(x):x\\in A\\}\\subseteq B\\)</div>
<div class="fr"><span class="fl">Composition</span>\\((g\\circ f)(x)=g(f(x))\\)</div>
<div class="fr"><span class="fl">Inverse</span>\\(f^{-1}\\) exists iff \\(f\\) is bijective (1-to-1 and onto)</div>
<div class="fr"><span class="fl">Identity</span>\\(f\\circ f^{-1}=f^{-1}\\circ f=\\text{id}\\)</div>
</div>`,

code:`import numpy as np

sigmoid = lambda x: 1/(1+np.exp(-x))
relu    = lambda x: np.maximum(0, x)
tanh    = np.tanh

x = np.linspace(-3, 3, 7)
print("sigmoid range (0,1):", sigmoid(x).round(3))
print("relu range [0,∞):   ", relu(x).round(3))
print("tanh range (-1,1):  ", tanh(x).round(3))

# Composition = forward pass
np.random.seed(0)
W1, b1 = np.random.randn(4,3), np.zeros(4)
W2, b2 = np.random.randn(2,4), np.zeros(2)

def layer(W, b, act, x): return act(W @ x + b)

x_in = np.array([1., 2., 3.])
h = layer(W1, b1, relu, x_in)         # f^(1)
y = layer(W2, b2, sigmoid, h)         # f^(2) ∘ f^(1)
print("output:", y.round(4))

# Verify: log is the inverse of exp

code:`import numpy as np, time

# O(n^3) matmul scaling
for n in [128, 256, 512]:
    A = np.random.randn(n, n)
    B = np.random.randn(n, n)
    t = time.perf_counter()
    for _ in range(10): A @ B
    t = (time.perf_counter()-t)/10
    print(f"n={n}: {t*1000:.2f}ms  ratio≈{t/(n**3)*1e9:.2f}ns/op")

# Attention: O(n^2 * d)
def attn(Q, K):  # (n,d)
    return Q @ K.T / Q.shape[1]**0.5   # (n,n)

# Same complexity as naive double loop, but 100× faster constant
n, d = 64, 128
Q = np.random.randn(n, d)
K = np.random.randn(n, d)
print("Attention output shape:", attn(Q,K).shape)  # (64, 64)`,

ai:"A word embedding in GPT is a vector in \\(\\mathbb{R}^{768}\\) or \\(\\mathbb{R}^{4096}\\). The weight matrix of a dense layer is a matrix that maps input vectors to output vectors. Every single forward pass in every neural network is a sequence of matrix-vector multiplications.",
pe:"A <strong>scalar</strong> is a single number. A <strong>vector</strong> is an ordered list of numbers (a point or direction in space). A <strong>matrix</strong> is a rectangular grid of numbers that transforms vectors.",
int:"Think of a scalar as a volume knob—it scales things up or down. A vector is an arrow: it has length and direction (e.g., the velocity of a ball). A matrix is a machine: feed it an arrow, get a new arrow out—rotated, stretched, or squashed.",
form:`<div class="fb">
<div class="fr"><span class="fl">Scalar</span>\\(a\\in\\mathbb{R}\\) — a single real number</div>
<div class="fr"><span class="fl">Vector</span>\\(\\mathbf{v}\\in\\mathbb{R}^n\\) — column of \\(n\\) numbers: \\(\\mathbf{v}=[v_1,v_2,\\ldots,v_n]^\\top\\)</div>
<div class="fr"><span class="fl">Matrix</span>\\(A\\in\\mathbb{R}^{m\\times n}\\) — \\(m\\) rows, \\(n\\) columns; entry at row \\(i\\), col \\(j\\) is \\(A_{ij}\\)</div>
<div class="fr"><span class="fl">Shape rule</span>Matrix-vector product \\(A\\mathbf{v}\\) requires \\(A\\in\\mathbb{R}^{m\\times n}\\), \\(\\mathbf{v}\\in\\mathbb{R}^n\\) → result in \\(\\mathbb{R}^m\\)</div>
<div class="fr"><span class="fl">Tensor</span>Generalisation: rank-0 = scalar, rank-1 = vector, rank-2 = matrix, rank-3+ = tensor</div>
</div>`,
der:[

["Shape of a matrix-vector product","\\(A\\in\\mathbb{R}^{m\\times n}\\), \\(\\mathbf{v}\\in\\mathbb{R}^n\\). The output \\(A\\mathbf{v}\\) has \\(m\\) entries: the \\(i\\)th entry is \\(\\sum_{j=1}^n A_{ij}v_j\\). The \\(n\\) columns of \\(A\\) must match the \\(n\\) rows of \\(\\mathbf{v}\\)."],
["Column view of \\(A\\mathbf{v}\\)","\\(A\\mathbf{v}=v_1\\mathbf{a}_1+v_2\\mathbf{a}_2+\\cdots+v_n\\mathbf{a}_n\\) where \\(\\mathbf{a}_j\\) is the \\(j\\)th column of \\(A\\). The result is a linear combination of \\(A\\)'s columns — a fundamental way to think about it."],
["NumPy shape vs math shape","In NumPy a vector of \\(n\\) numbers has shape \\((n,)\\) — 1D array, not a column vector. A \\((n,1)\\) array is a 2D column. Broadcasting treats \\((n,)\\) as a row when needed, which can cause subtle bugs."]
],
code:`import numpy as np

# Scalars
a = 3.14
print(type(a), a)

# Vectors (1D arrays in NumPy)
v = np.array([1., 2., 3.])
print("shape:", v.shape)   # (3,)  — not (3,1)!

# Column vector (2D)
v_col = v.reshape(-1, 1)
print("col shape:", v_col.shape)  # (3, 1)

# Matrices
W = np.array([[1., 2., 3.],
              [4., 5., 6.]])
print("W shape:", W.shape)   # (2, 3)
print("W[0,1] =", W[0,1])   # 2.0  (row 0, col 1)

# Matrix-vector product: (2,3) @ (3,) -> (2,)
x = np.array([1., 0., -1.])
out = W @ x
print("W @ x =", out)   # [1-3, 4-6] = [-2, -2]

# Neural network forward pass: linear layer
def linear(W, b, x): return W @ x + b
b = np.array([1., 1.])
print("linear:", linear(W, b, x))`,

dd:`<div class="ddw"><h3>Tensors Beyond Rank 2</h3><p>In PyTorch, everything is a tensor. A batch of \\(B\\) sequences each of length \\(T\\) with embedding dim \\(d\\) is a rank-3 tensor of shape \\((B,T,d)\\). Attention produces \\((B,H,T,T)\\) score tensors where \\(H\\) is the number of heads. Operations like <code>einsum</code> and <code>torch.bmm</code> (batch matrix multiply) handle rank-3+ tensors. The math of vectors and matrices extends naturally: each \\((B,T,T)\\) attention score matrix is just \\(B\\cdot H\\) independent \\((T\\times T)\\) matrices stacked along the batch dimensions.</p></div>`
},

ai:"Gradient descent updates parameters via \\(\\boldsymbol{\\theta}\\leftarrow\\boldsymbol{\\theta}-\\alpha\\nabla_\\theta\\mathcal{L}\\). This is vector subtraction (\\(\\boldsymbol{\\theta}\\) minus a scaled gradient): exactly the two operations covered here. Word2Vec learns embeddings where \\(\\mathbf{v}_{\\text{king}}-\\mathbf{v}_{\\text{man}}+\\mathbf{v}_{\\text{woman}}\\approx\\mathbf{v}_{\\text{queen}}\\)—pure vector arithmetic.",
pe:"<strong>Vector addition</strong> adds corresponding components. <strong>Scalar multiplication</strong> stretches or shrinks a vector (and flips its direction if the scalar is negative).",
int:"Imagine vectors as arrows in 2D space. Adding two arrows: place the tail of the second at the tip of the first—the sum arrow runs from start to final tip (parallelogram law). Multiplying by 2 doubles the arrow's length; multiplying by \\(-1\\) flips it 180°.",
form:`<div class="fb">
<div class="fr"><span class="fl">Addition</span>\\((\\mathbf{u}+\\mathbf{v})_i=u_i+v_i\\) — component-wise</div>
<div class="fr"><span class="fl">Scalar mult.</span>\\((c\\mathbf{v})_i=c\\,v_i\\) — scales every component</div>
<div class="fr"><span class="fl">Subtraction</span>\\(\\mathbf{u}-\\mathbf{v}=\\mathbf{u}+(-1)\\mathbf{v}\\)</div>
<div class="fr"><span class="fl">Linear combo</span>\\(c_1\\mathbf{v}_1+c_2\\mathbf{v}_2+\\cdots+c_k\\mathbf{v}_k\\)</div>
<div class="fr"><span class="fl">Properties</span>Commutative, associative; \\(c(\\mathbf{u}+\\mathbf{v})=c\\mathbf{u}+c\\mathbf{v}\\)</div>
</div>`,
der:[
["Component-wise definition","\\(\\mathbf{u}=[u_1,\\ldots,u_n]^\\top\\), \\(\\mathbf{v}=[v_1,\\ldots,v_n]^\\top\\). Then \\(\\mathbf{u}+\\mathbf{v}=[u_1+v_1,\\ldots,u_n+v_n]^\\top\\). Vectors must have the same dimension."],
["Geometric parallelogram law","Place \\(\\mathbf{u}\\) and \\(\\mathbf{v}\\) with a common tail. The diagonal of the parallelogram they form equals \\(\\mathbf{u}+\\mathbf{v}\\). This is consistent with component-wise addition by the Pythagorean theorem."],
["Scalar multiplication direction","If \\(c>0\\): same direction, scaled magnitude. If \\(c<0\\): opposite direction. If \\(c=0\\): zero vector."],
["Gradient descent as vector ops","\\(\\boldsymbol{\\theta}_{t+1}=\\boldsymbol{\\theta}_t-\\alpha\\mathbf{g}_t\\) where \\(\\mathbf{g}_t=\\nabla_\\theta\\mathcal{L}\\). Step 1: scale gradient by \\(\\alpha\\). Step 2: subtract from current params. Both are basic vector operations on parameter vectors of dimension equal to the number of model parameters."]
],
code:`import numpy as np

u = np.array([1., 2., 3.])
v = np.array([4., -1., 0.])

print("u + v =", u + v)      # [5. 1. 3.]
print("u - v =", u - v)      # [-3. 3. 3.]
print("2 * v =", 2 * v)      # [8. -2. 0.]
print("-v    =", -v)          # [-4. 1. -0.]

# Gradient descent parameter update
theta = np.array([0.5, -0.3, 1.2])
grad  = np.array([0.1,  0.4, -0.2])
lr    = 0.01
theta_new = theta - lr * grad
print("theta before:", theta)
print("theta after: ", theta_new)

# Word vector arithmetic (analogy)
# king - man + woman ≈ queen
king  = np.array([0.9, 0.1, 0.8])
man   = np.array([0.8, 0.1, 0.2])
woman = np.array([0.1, 0.9, 0.2])
queen = king - man + woman
print("king-man+woman ≈", queen)  # [0.2, 0.9, 0.8]`,

dd:`<div class="ddw"><h3>Vector Spaces: The Abstract Foundation</h3><p>The operations of addition and scalar multiplication, together with their 8 properties (commutativity, associativity, distributivity, etc.), define a <em>vector space</em>. The elements don't have to be tuples of numbers — functions, polynomials, and probability distributions can all form vector spaces. This abstraction matters in ML: the space of all functions \\(f:\\mathbb{R}^n\\to\\mathbb{R}\\) is a vector space (infinite-dimensional), and kernel methods and Gaussian processes operate in such spaces. The intuition from \\(\\mathbb{R}^n\\) extends everywhere the axioms hold.</p></div>`
},
{t:2,n:3,title:"The Dot Product",
ai:"In the Transformer attention mechanism (Vaswani et al. 2017), the raw attention score between query \\(\\mathbf{q}_i\\) and key \\(\\mathbf{k}_j\\) is \\(\\mathbf{q}_i\\cdot\\mathbf{k}_j/\\sqrt{d_k}\\). This dot product measures how much query \\(i\\) 'attends to' key \\(j\\). Cosine similarity — the normalised dot product — is the standard metric for embedding retrieval in vector databases.",
pe:"The <strong>dot product</strong> of two vectors multiplies corresponding components and sums the results. Geometrically, it measures how aligned two vectors are: positive means they point in similar directions, zero means perpendicular, negative means opposite.",
int:"Imagine two arrows in 2D. If both point right, their dot product is large and positive. If one points right and the other points up (perpendicular), the dot product is exactly zero. If they point in opposite directions, it's negative. The dot product is the algebraic way to ask 'how much do these two directions agree?'",
form:`<div class="fb">
<div class="fr"><span class="fl">Algebraic</span>\\(\\mathbf{u}\\cdot\\mathbf{v}=\\sum_{i=1}^n u_i v_i=u_1v_1+u_2v_2+\\cdots+u_nv_n\\)</div>
<div class="fr"><span class="fl">Geometric</span>\\(\\mathbf{u}\\cdot\\mathbf{v}=\\|\\mathbf{u}\\|\\|\\mathbf{v}\\|\\cos\\theta\\) where \\(\\theta\\) is the angle between them</div>
<div class="fr"><span class="fl">Cosine sim.</span>\\(\\cos\\theta=\\dfrac{\\mathbf{u}\\cdot\\mathbf{v}}{\\|\\mathbf{u}\\|\\|\\mathbf{v}\\|}\\in[-1,1]\\)</div>
<div class="fr"><span class="fl">L2 norm</span>\\(\\|\\mathbf{v}\\|=\\sqrt{\\mathbf{v}\\cdot\\mathbf{v}}=\\sqrt{\\sum_i v_i^2}\\)</div>
<div class="fr"><span class="fl">Orthogonal</span>\\(\\mathbf{u}\\perp\\mathbf{v}\\iff\\mathbf{u}\\cdot\\mathbf{v}=0\\)</div>
</div>`,
der:[
["Algebraic → geometric equivalence","Let \\(\\theta\\) be the angle between \\(\\mathbf{u}\\) and \\(\\mathbf{v}\\). Consider the vector \\(\\mathbf{w}=\\mathbf{u}-\\mathbf{v}\\). By the law of cosines: \\(\\|\\mathbf{w}\\|^2=\\|\\mathbf{u}\\|^2+\\|\\mathbf{v}\\|^2-2\\|\\mathbf{u}\\|\\|\\mathbf{v}\\|\\cos\\theta\\)."],
["Expand algebraically","\\(\\|\\mathbf{w}\\|^2=\\mathbf{w}\\cdot\\mathbf{w}=(\\mathbf{u}-\\mathbf{v})\\cdot(\\mathbf{u}-\\mathbf{v})=\\|\\mathbf{u}\\|^2-2\\mathbf{u}\\cdot\\mathbf{v}+\\|\\mathbf{v}\\|^2\\)."],
["Equate and solve","Setting both expressions equal: \\(\\|\\mathbf{u}\\|^2+\\|\\mathbf{v}\\|^2-2\\|\\mathbf{u}\\|\\|\\mathbf{v}\\|\\cos\\theta=\\|\\mathbf{u}\\|^2-2\\mathbf{u}\\cdot\\mathbf{v}+\\|\\mathbf{v}\\|^2\\). Cancel common terms and divide by \\(-2\\): \\(\\mathbf{u}\\cdot\\mathbf{v}=\\|\\mathbf{u}\\|\\|\\mathbf{v}\\|\\cos\\theta\\). ∎"],
["Attention score derivation","Query \\(\\mathbf{q}\\in\\mathbb{R}^{d_k}\\), key \\(\\mathbf{k}\\in\\mathbb{R}^{d_k}\\). Score \\(=\\mathbf{q}\\cdot\\mathbf{k}/\\sqrt{d_k}\\). Without \\(/\\sqrt{d_k}\\), for large \\(d_k\\) the dot products grow in magnitude, pushing softmax into saturation (near-zero gradients). Dividing by \\(\\sqrt{d_k}\\) keeps variance ≈ 1."]
],
code:`import numpy as np

u = np.array([1., 2., 3.])
v = np.array([4., -1., 2.])

# Algebraic dot product
dot_algebraic = np.dot(u, v)       # or u @ v
print("u·v =", dot_algebraic)     # 4 - 2 + 6 = 8

# Geometric: verify with angle
norm_u = np.linalg.norm(u)
norm_v = np.linalg.norm(v)
cos_theta = dot_algebraic / (norm_u * norm_v)
theta_deg = np.degrees(np.arccos(np.clip(cos_theta, -1, 1)))
print(f"cos θ = {cos_theta:.4f}, θ = {theta_deg:.1f}°")

# Cosine similarity for embedding retrieval
def cosine_sim(a, b):
    return np.dot(a, b) / (np.linalg.norm(a) * np.linalg.norm(b))

# Attention scores (scaled dot product)
def attention_scores(Q, K):  # Q,K: (n, d_k)
    d_k = Q.shape[-1]
    return Q @ K.T / np.sqrt(d_k)  # (n, n)

Q = np.random.randn(4, 64)
K = np.random.randn(4, 64)
scores = attention_scores(Q, K)
print("Attention scores shape:", scores.shape)   # (4, 4)
print("Scores std:", scores.std().round(3))       # ≈ 1.0 (stable)`,

dd:`<div class="ddw"><h3>Why Dot Product Detects Similarity</h3><p>The dot product \\(\\mathbf{u}\\cdot\\mathbf{v}=\\|\\mathbf{u}\\|\\|\\mathbf{v}\\|\\cos\\theta\\) decomposes into two parts: magnitudes (how big) and alignment (\\(\\cos\\theta\\)). In retrieval systems we want to rank by alignment, not magnitude — a long but off-topic document should rank below a short relevant one. That's why cosine similarity divides out the magnitudes. In attention we don't normalise the norms of \\(\\mathbf{q}\\) and \\(\\mathbf{k}\\) (we only divide by \\(\\sqrt{d_k}\\) for stability), so attention implicitly uses the full dot product — both magnitude and alignment. This is intentional: the model can learn to make certain keys have higher magnitude, which boosts their attention weight regardless of direction.</p></div>`
},

ai:"Every dense (fully connected) layer computes \\(H=\\sigma(XW^\\top+\\mathbf{b})\\) where \\(X\\in\\mathbb{R}^{B\\times d_{in}}\\) is the batch and \\(W\\in\\mathbb{R}^{d_{out}\\times d_{in}}\\) is the weight matrix. The attention score matrix \\(QK^\\top\\in\\mathbb{R}^{n\\times n}\\) is a matrix product. Matrix multiplication is the core operation of deep learning.",
pe:"<strong>Matrix multiplication</strong> combines two matrices by taking dot products of rows from the first with columns of the second. It represents composing two linear transformations—applying one function after another.",
int:"Think of each matrix as a different language translator. \\(A\\) translates from language 1 to language 2; \\(B\\) translates from language 2 to language 3. Their product \\(AB\\) translates directly from 1 to 3, skipping the middle language. The result at row \\(i\\), column \\(j\\) answers: 'how much does input \\(j\\) contribute to output \\(i\\) via the whole translation chain?'",

</div>`,
der:[
["Row-column rule","\\((AB)_{ij}=\\sum_{k=1}^p A_{ik}B_{kj}\\). Row \\(i\\) of \\(A\\) has \\(p\\) entries; column \\(j\\) of \\(B\\) has \\(p\\) entries. Dot product them."],
["Column view","\\(AB\\)'s \\(j\\)th column = \\(A\\) times \\(B\\)'s \\(j\\)th column: \\((AB)_{\\cdot j}=A(B_{\\cdot j})\\). Each output column is a linear transformation of an input column."],
["Composition of linear maps","If \\(f(\\mathbf{x})=A\\mathbf{x}\\) and \\(g(\\mathbf{y})=B\\mathbf{y}\\), then \\((g\\circ f)(\\mathbf{x})=B(A\\mathbf{x})=(BA)\\mathbf{x}\\). The product \\(BA\\) represents doing \\(A\\) first, then \\(B\\)."],
["Why \\(AB\\neq BA\\)","Applying transformation A then B is generally different from B then A — just like rotating then reflecting ≠ reflecting then rotating. Even when both are defined and same shape, they differ."],
["Transpose rule \\((AB)^\\top=B^\\top A^\\top\\)","\\(((AB)^\\top)_{ij}=(AB)_{ji}=\\sum_k A_{jk}B_{ki}=(B^\\top A^\\top)_{ij}\\). The order reverses."]
],
code:`import numpy as np

A = np.array([[1., 2.],
              [3., 4.],
              [5., 6.]])   # (3,2)

B = np.array([[7., 8., 9.],
              [10.,11.,12.]])  # (2,3)

C = A @ B                  # (3,2)@(2,3) -> (3,3)
print("Shape:", C.shape)   # (3, 3)
print(C)
# Verify entry (0,0): row0(A)·col0(B) = 1*7+2*10 = 27
print("C[0,0] =", C[0,0])  # 27.0

# NOT commutative
D = B @ A  # (2,3)@(3,2) -> (2,2)  — different shape!
print("B@A shape:", D.shape)  # (2, 2)

# Transpose rule
print("(A@B).T equal to B.T@A.T?",
      np.allclose((A@B).T, B.T@A.T))  # True

# Batch matmul: (B, n, d) @ (B, d, m) -> (B, n, m)
batch_Q = np.random.randn(8, 10, 64)  # 8 heads, 10 tokens, d=64
batch_K = np.random.randn(8, 10, 64)
scores   = batch_Q @ batch_K.transpose(0, 2, 1)  # (8,10,10)
print("Attention scores shape:", scores.shape)`,

dd:`<div class="ddw"><h3>Optimal Parenthesisation of Matrix Chains</h3><p>Matrix multiplication is associative: \\((AB)C=A(BC)\\). But the cost varies hugely. Given \\(A\\in\\mathbb{R}^{10\\times1000}\\), \\(B\\in\\mathbb{R}^{1000\\times10}\\), \\(C\\in\\mathbb{R}^{10\\times1000}\\): computing \\((AB)C\\) costs \\(10\\cdot1000\\cdot10+10\\cdot10\\cdot1000=200000\\) ops; computing \\(A(BC)\\) costs \\(1000\\cdot10\\cdot1000+10\\cdot1000\\cdot1000=2000000\\) ops — 10× more. In PyTorch, <code>torch.linalg.multi_dot</code> picks the optimal parenthesisation automatically. When writing custom attention code, the order in which you multiply \\(Q,K,V\\) and weight matrices can significantly affect performance.</p></div>`
},

ai:"In a transformer, the attention weight matrix is \\(A=\\text{softmax}(QK^\\top/\\sqrt{d_k})\\). The \\(K^\\top\\) transposes keys so that \\(QK^\\top\\) has shape \\((n\\times n)\\). The weight matrices in many architectures are symmetric (\\(W=W^\\top\\)) or orthogonal (\\(W^\\top W=I\\)). Orthogonal initialisation preserves gradient norms through early training.",
pe:"The <strong>transpose</strong> \\(A^\\top\\) flips a matrix over its main diagonal — rows become columns. <strong>Special matrices</strong> (identity \\(I\\), zero \\(0\\), symmetric, diagonal, orthogonal) have properties that simplify computations enormously.",
int:"Think of the transpose as rotating a spreadsheet 90° and then flipping it. A symmetric matrix is its own transpose — its spreadsheet looks the same flipped. An orthogonal matrix is a rotation/reflection: it preserves all lengths and angles, so it's a 'pure geometry' operation with no stretching.",

["Transpose of a product","\\(((AB)^\\top)_{ij}=(AB)_{ji}=\\sum_k A_{jk}B_{ki}=\\sum_k(B^\\top)_{ik}(A^\\top)_{kj}=(B^\\top A^\\top)_{ij}\\). So \\((AB)^\\top=B^\\top A^\\top\\)."],

code:`import numpy as np

A = np.array([[1., 2., 3.],
              [4., 5., 6.]])  # (2,3)
print("A.T shape:", A.T.shape)  # (3,2)
print(A.T)

# Identity matrix
I = np.eye(3)
x = np.array([1., 2., 3.])
print("I @ x =", I @ x)    # [1. 2. 3.] — unchanged

# Symmetric matrix (covariance)
X = np.random.randn(100, 5)
C = X.T @ X / 100           # sample covariance (5×5)
print("C symmetric?", np.allclose(C, C.T))   # True

# Orthogonal matrix via QR decomposition
Q, R = np.linalg.qr(np.random.randn(4, 4))
print("Q.T @ Q = I?", np.allclose(Q.T @ Q, np.eye(4)))  # True
# Verify norm preservation
v = np.random.randn(4)
print("||v|| =", np.linalg.norm(v).round(4))
print("||Qv||=", np.linalg.norm(Q @ v).round(4))  # same`,

dd:`<div class="ddw"><h3>Orthogonal Initialisation in Deep Learning</h3><p>When training very deep networks, gradients can explode or vanish as they're multiplied by weight matrices at each layer. Orthogonal initialisation (Saxe et al. 2013) sets each weight matrix \\(W\\) to a random orthogonal matrix (or its truncated version for non-square \\(W\\)). Since \\(\\|W\\mathbf{v}\\|=\\|\\mathbf{v}\\|\\) for orthogonal \\(W\\), the gradient norm stays constant through each layer at initialisation, preventing early-training instability. This is especially important for RNNs and very deep residual networks. PyTorch exposes this as <code>torch.nn.init.orthogonal_</code>.</p></div>`
},
{t:2,n:6,title:"Hadamard Product & Broadcasting",
ai:"In LSTM gates, the output is \\(\\mathbf{h}_t=\\mathbf{o}_t\\odot\\tanh(\\mathbf{c}_t)\\) — an element-wise product (Hadamard) between two vectors. In self-attention, the causal mask is applied by element-wise addition of a \\(-\\infty\\) matrix to the score matrix. NumPy broadcasting lets you add a \\((1,n)\\) bias to a \\((B,n)\\) batch without writing a loop.",
pe:"The <strong>Hadamard product</strong> \\(A\\odot B\\) multiplies corresponding elements — completely different from matrix multiplication. <strong>Broadcasting</strong> automatically expands smaller arrays to match larger ones for element-wise operations.",
int:"Hadamard product is like two musicians playing in parallel — each instrument plays its own note at the same time without interacting with the other. Matrix multiplication is like a choir where everyone interacts. Broadcasting is like a recipe that says 'season each dish to taste' — Python automatically repeats the 'season' step for every dish in the batch.",
form:`<div class="fb">
<div class="fr"><span class="fl">Hadamard</span>\\((A\\odot B)_{ij}=A_{ij}B_{ij}\\) — element-wise; same shape required</div>
<div class="fr"><span class="fl">NumPy op</span><code>A * B</code> for Hadamard; <code>A @ B</code> for matmul</div>
<div class="fr"><span class="fl">Broadcasting rule</span>Dimensions aligned right-to-left; size-1 dims are stretched</div>
<div class="fr"><span class="fl">Example</span>\\((B,n)+(1,n)\\to(B,n)\\): the \\((1,n)\\) is repeated \\(B\\) times</div>
<div class="fr"><span class="fl">LSTM gate</span>\\(\\mathbf{h}_t=\\mathbf{o}_t\\odot\\tanh(\\mathbf{c}_t)\\): gate controls cell state output</div>
</div>`,
der:[
["Broadcasting alignment","Align shapes right-to-left: \\((4,3,2)\\) and \\((3,2)\\). After alignment: \\((4,3,2)\\) and \\((1,3,2)\\). The size-1 leading dimension is broadcast (repeated 4 times). Result: \\((4,3,2)\\)."],
["Compatible dimensions","Two dimensions are compatible if they are equal, or one of them is 1. Examples: \\((5,1)\\) and \\((1,3)\\) → \\((5,3)\\). But \\((5,2)\\) and \\((3,2)\\) → error (5≠3, neither is 1)."],
["LSTM gating mechanism","The forget gate \\(\\mathbf{f}_t=\\sigma(W_f[\\mathbf{h}_{t-1};\\mathbf{x}_t]+\\mathbf{b}_f)\\) outputs values in \\((0,1)\\). Multiplying \\(\\mathbf{f}_t\\odot\\mathbf{c}_{t-1}\\) element-wise selectively erases memory cells. This is the Hadamard product in action — each cell is independently gated."]
],
code:`import numpy as np

A = np.array([[1., 2.],
              [3., 4.]])
B = np.array([[5., 6.],
              [7., 8.]])

# Hadamard (element-wise) -- NOT matrix multiply
print("A * B =\n", A * B)    # [[5,12],[21,32]]
print("A @ B =\n", A @ B)    # [[19,22],[43,50]]  -- different!

# Broadcasting: add bias to batch
X = np.random.randn(32, 128)   # batch of 32, dim=128
b = np.zeros(128)              # bias: shape (128,)
out = X + b                    # (32,128) + (128,) -> (32,128)
print("out shape:", out.shape)

# Broadcasting: outer product via broadcasting
u = np.array([[1.], [2.], [3.]])    # (3,1)
v = np.array([[4., 5., 6.]])         # (1,3)
print("outer product:\n", u * v)     # (3,3)

# LSTM output gate
hidden_dim = 4
o_t = np.random.rand(hidden_dim)    # output gate, (0,1)
c_t = np.random.randn(hidden_dim)   # cell state
h_t = o_t * np.tanh(c_t)           # element-wise (Hadamard)
print("h_t:", h_t.round(4))

# Attention causal mask: add -inf to future positions
T = 4
scores = np.random.randn(T, T)
mask = np.triu(np.full((T,T), -np.inf), k=1)   # upper triangle
masked = scores + mask   # broadcasting adds -inf to future
print("masked scores:\n", masked.round(2))`,

dd:`<div class="ddw"><h3>Why Hadamard Gating Works</h3><p>The Hadamard product \\(\\mathbf{g}\\odot\\mathbf{x}\\) where \\(\\mathbf{g}\\in(0,1)^n\\) implements a soft, differentiable switch: when \\(g_i\\approx1\\) the value \\(x_i\\) passes through; when \\(g_i\\approx0\\) it is suppressed. This is the key idea in LSTMs, GRUs, and gated attention. The sigmoid gate \\(\\mathbf{g}=\\sigma(W\\mathbf{x}+\\mathbf{b})\\) is itself differentiable, so gradients flow back through the gate into both the gate weights \\(W\\) and the input \\(\\mathbf{x}\\). This is fundamentally what makes gated architectures trainable: every operation, including the multiplicative gate, has a well-defined gradient.</p></div>`
},

{t:3,n:1,title:"Systems of Linear Equations",
ai:"Training a linear model by solving \\(X\\mathbf{w}=\\mathbf{y}\\) directly (normal equations \\(\\hat{\\mathbf{w}}=(X^\\top X)^{-1}X^\\top\\mathbf{y}\\)) is a system of linear equations. Understanding when this system has 0, 1, or infinitely many solutions tells you when a model is underdetermined (too few data points) or overdetermined (more data than parameters).",
pe:"A <strong>system of linear equations</strong> is a collection of equations, each linear in the unknowns, that must all be satisfied simultaneously. We write it as \\(A\\mathbf{x}=\\mathbf{b}\\) and ask: does a solution exist? Is it unique?",
int:"Imagine three flat planes in 3D space. Two planes generally intersect in a line. Three planes generally intersect in a single point — the unique solution. But if all three planes are parallel or two are the same, there's no solution or infinitely many. The same geometry plays out in high-dimensional feature spaces.",
form:`<div class="fb">
<div class="fr"><span class="fl">Matrix form</span>\\(A\\mathbf{x}=\\mathbf{b}\\), \\(A\\in\\mathbb{R}^{m\\times n}\\), \\(\\mathbf{x}\\in\\mathbb{R}^n\\), \\(\\mathbf{b}\\in\\mathbb{R}^m\\)</div>
<div class="fr"><span class="fl">Augmented matrix</span>\\([A|\\mathbf{b}]\\) — append \\(\\mathbf{b}\\) as last column for elimination</div>
<div class="fr"><span class="fl">Existence</span>Solution exists iff \\(\\mathbf{b}\\in\\text{col}(A)\\) (\\(\\mathbf{b}\\) is in the column space of \\(A\\))</div>
<div class="fr"><span class="fl">Uniqueness</span>Solution is unique iff \\(\\text{null}(A)=\\{\\mathbf{0}\\}\\) (only trivial null space)</div>
<div class="fr"><span class="fl">Consistency</span>\\(\\text{rank}([A|\\mathbf{b}])=\\text{rank}(A)\\Leftrightarrow\\) system is consistent</div>
</div>`,
der:[
["Three cases","(1) Unique solution: \\(\\text{rank}(A)=n\\) and \\(\\mathbf{b}\\in\\text{col}(A)\\). (2) No solution: \\(\\mathbf{b}\\notin\\text{col}(A)\\). (3) Infinitely many: \\(\\text{rank}(A)<n\\) and consistent."],
["Geometric interpretation","Each equation \\(\\mathbf{a}_i^\\top\\mathbf{x}=b_i\\) defines a hyperplane in \\(\\mathbb{R}^n\\). The solution set is the intersection of all \\(m\\) hyperplanes."],
["Connection to null space","If \\(A\\mathbf{x}_0=\\mathbf{b}\\) and \\(A\\mathbf{x}_h=\\mathbf{0}\\), then \\(A(\\mathbf{x}_0+\\mathbf{x}_h)=\\mathbf{b}\\). The full solution set is \\(\\mathbf{x}_0+\\text{null}(A)\\)."],
["ML connection","In linear regression with \\(n=d\\) features and \\(m\\) data points: if \\(m<d\\), underdetermined (infinitely many solutions). If \\(m>d\\), overdetermined (typically no exact solution — use least squares)."]
],
code:`import numpy as np

# Unique solution
A = np.array([[2., 1.], [1., 3.]])
b = np.array([5., 10.])
x = np.linalg.solve(A, b)
print("Solution:", x)           # [1. 3.]
print("Verify:", A @ x)         # [5. 10.]
print("rank(A):", np.linalg.matrix_rank(A))

# Overdetermined: least squares
A2 = np.array([[1.,1.],[2.,1.],[3.,1.]])
b2 = np.array([1.,3.,2.])
x_ls, _, _, _ = np.linalg.lstsq(A2, b2, rcond=None)
print("LS solution:", x_ls.round(4))

def check_system(A, b):
    r_A = np.linalg.matrix_rank(A)
    Ab = np.hstack([A, b.reshape(-1,1)])
    r_Ab = np.linalg.matrix_rank(Ab)
    n = A.shape[1]
    if r_Ab > r_A: return "No solution"
    elif r_A == n: return "Unique solution"
    else: return f"Infinite (dim={n-r_A})"
print(check_system(A, b))`,

dd:`<div class="ddw"><h3>Geometry of Least Squares</h3><p>When \\(A\\mathbf{x}=\\mathbf{b}\\) has no exact solution, least squares minimises \\(\\|A\\mathbf{x}-\\mathbf{b}\\|^2\\). Geometrically this is the point in \\(\\text{col}(A)\\) closest to \\(\\mathbf{b}\\) — the orthogonal projection. The residual \\(\\mathbf{b}-A\\hat{\\mathbf{x}}\\) is perpendicular to every column of \\(A\\), giving normal equations \\(A^\\top A\\hat{\\mathbf{x}}=A^\\top\\mathbf{b}\\). This projection geometry underlies linear regression, ridge regression, and all least-squares statistics.</p></div>`

{t:3,n:2,title:"Gaussian Elimination",
ai:"NumPy's <code>linalg.solve</code> uses LU decomposition internally — a stable version of Gaussian elimination. Understanding elimination tells you why solving a \\(10000\\times10000\\) system takes \\(O(n^3)\\) time, why numerical pivoting matters, and why you should never compute \\(A^{-1}\\) to solve \\(A\\mathbf{x}=\\mathbf{b}\\).",
pe:"<strong>Gaussian elimination</strong> transforms \\([A|\\mathbf{b}]\\) into row-echelon form using three operations, then back-substitutes to find \\(\\mathbf{x}\\).",
int:"Think of elimination as eliminating suspects. The first equation lets you express \\(x_1\\) in terms of the others; substituting eliminates \\(x_1\\) from the rest. Repeat until one equation has one unknown. Then work backwards.",
form:`<div class="fb">
<div class="fr"><span class="fl">Row ops</span>\\(R_i\\leftrightarrow R_j\\) (swap), \\(R_i\\to cR_i\\) (scale), \\(R_i\\to R_i-mR_j\\) (eliminate)</div>

<div class="fr"><span class="fl">Row echelon</span>Each leading entry right of the row above's leading entry</div>

der:[
["Forward elimination","To zero out entry \\((i,j)\\): \\(m=A_{ij}/A_{jj}\\), then \\(R_i\\leftarrow R_i-mR_j\\)."],

["Partial pivoting","Swap to bring largest element to pivot position before each step. Prevents amplification by large multipliers."],

code:`import numpy as np

def gauss_elim(A, b):
    n = len(b)
    Ab = np.hstack([A.astype(float), b.reshape(-1,1).astype(float)])
    for j in range(n):
        for i in range(j+1, n):
            m = Ab[i,j] / Ab[j,j]
            Ab[i] -= m * Ab[j]
    x = np.zeros(n)
    for i in range(n-1, -1, -1):
        x[i] = (Ab[i,-1] - Ab[i,i+1:n] @ x[i+1:n]) / Ab[i,i]
    return x

A = np.array([[2.,1.,-1.],[-3.,-1.,2.],[-2.,1.,2.]])
b = np.array([8.,-11.,-3.])
x = gauss_elim(A, b)
print("x =", x)                       # [2. 3. -1.]
print("verify:", np.allclose(A@x, b))
# NumPy's solve is LU-based (stable, pivoted)
print("np.solve:", np.linalg.solve(A, b))`,

dd:`<div class="ddw"><h3>LU Decomposition</h3><p>Gaussian elimination (without pivoting) factors \\(A=LU\\) where \\(L\\) is lower-triangular (stores multipliers \\(m_{ij}\\)) and \\(U\\) is the row-echelon form. To solve \\(A\\mathbf{x}=\\mathbf{b}\\): forward-solve \\(L\\mathbf{y}=\\mathbf{b}\\) (\\(O(n^2)\\)), then back-solve \\(U\\mathbf{x}=\\mathbf{y}\\) (\\(O(n^2)\\)). The factorisation is \\(O(n^3)\\) but once computed, any new right-hand side costs only \\(O(n^2)\\). This is how all production solvers work.</p></div>`
},
{t:3,n:3,title:"Rank & Null Space",
ai:"The rank of a weight matrix is its effective number of independent directions. LoRA fine-tunes a frozen LLM by adding \\(\\Delta W=BA\\), \\(B\\in\\mathbb{R}^{d\\times r}\\), \\(A\\in\\mathbb{R}^{r\\times d}\\), \\(r\\ll d\\). It works because the update lies in a low-dimensional subspace (rank \\(\\leq r\\)).",
pe:"The <strong>rank</strong> is the maximum number of linearly independent columns (= dimension of column space). The <strong>null space</strong> is the set of all vectors that the matrix maps to zero.",
int:"Think of a matrix as a projector. Rank = dimension of what's on the screen. Null space = everything that projects to the same spot (the 'shadow' of zero).",
form:`<div class="fb">
<div class="fr"><span class="fl">Column space</span>\\(\\text{col}(A)=\\{A\\mathbf{x}:\\mathbf{x}\\in\\mathbb{R}^n\\}\\)</div>
<div class="fr"><span class="fl">Null space</span>\\(\\text{null}(A)=\\{\\mathbf{x}:A\\mathbf{x}=\\mathbf{0}\\}\\)</div>
<div class="fr"><span class="fl">Rank</span>\\(\\text{rank}(A)=\\dim(\\text{col}(A))\\)</div>
<div class="fr"><span class="fl">Rank-Nullity</span>\\(\\text{rank}+\\text{nullity}=n\\) (# cols)</div>
<div class="fr"><span class="fl">Full rank</span>\\(\\text{rank}=\\min(m,n)\\)</div>
</div>`,
der:[
["Rank-Nullity","Free variables in row echelon = nullity. Pivot columns = rank. Together: \\(\\text{rank}+\\text{nullity}=n\\)."],
["Row rank = column rank","Elementary row ops don't change row space. Pivots count independent rows AND columns."],
["LoRA","\\(\\text{rank}(\\Delta W)=\\text{rank}(BA)\\leq\\min(\\text{rank}(B),\\text{rank}(A))\\leq r\\). Parameters: \\(2rd\\) vs \\(d^2\\)."]
],
code:`import numpy as np

A = np.array([[1.,2.,3.],[2.,4.,6.],[1.,1.,2.]])
print("rank(A):", np.linalg.matrix_rank(A))   # 2

def null_space(A, tol=1e-10):
    _, s, Vt = np.linalg.svd(A)
    full_null = np.zeros(A.shape[1], dtype=bool)
    full_null[A.shape[0]:] = True
    full_null[:len(s)] = (s < tol)
    return Vt[full_null].T

A2 = np.array([[1.,2.,3.],[2.,4.,6.]])
N = null_space(A2)
print("null shape:", N.shape)  # (3,2)
print("A2@N~0:", np.allclose(A2@N, 0))

d, r = 4096, 8
print(f"LoRA: {2*d*r:,} vs full: {d*d:,}")`,

dd:`<div class="ddw"><h3>Four Fundamental Subspaces</h3><p>Every \\(A\\in\\mathbb{R}^{m\\times n}\\) has four fundamental subspaces: col(A)⊆ℝᵐ, null(A)⊆ℝⁿ, row(A)⊆ℝⁿ, null(Aᵀ)⊆ℝᵐ. They come in orthogonal pairs: null(A)⊥row(A) and null(Aᵀ)⊥col(A). The SVD reveals all four: left singular vectors span col(A) and null(Aᵀ); right singular vectors span row(A) and null(A).</p></div>`

code:`import numpy as np

def is_independent(vectors):
    A = np.column_stack(vectors)
    return np.linalg.matrix_rank(A) == len(vectors)

dd:`<div class="ddw"><h3>Intrinsic Dimensionality of Neural Representations</h3><p>Li et al. (2018) measured that many NLP tasks can be solved in as few as 25–200 intrinsic dimensions, even with millions of parameters. This was found by randomly projecting gradient updates into low-dimensional subspaces and seeing when performance degraded. This underpins LoRA, prompt tuning, and PEFT: the effective learning signal lives in a low-dimensional subspace, so updating only a low-rank component suffices.</p></div>`

{t:3,n:6,title:"Gram-Schmidt & QR Decomposition",
ai:"QR underlies numerically stable least-squares solvers, QR iteration for eigenvalues, and orthogonalisation of transformer key/query projections in linear attention variants. NumPy's <code>linalg.lstsq</code> uses QR internally.",
pe:"<strong>Gram-Schmidt</strong> turns independent vectors into an orthonormal set. <strong>QR</strong> factors \\(A=QR\\) where \\(Q\\) has orthonormal columns and \\(R\\) is upper triangular.",
int:"Gram-Schmidt: like arranging furniture — place the first piece, then adjust each subsequent piece to not overlap with previous ones. QR packages this into factors.",
form:`<div class="fb">
<div class="fr"><span class="fl">Gram-Schmidt</span>\\(\\mathbf{u}_k=\\mathbf{v}_k-\\sum_{j<k}(\\mathbf{v}_k\\cdot\\mathbf{q}_j)\\mathbf{q}_j,\\;\\mathbf{q}_k=\\mathbf{u}_k/\\|\\mathbf{u}_k\\|\\)</div>
<div class="fr"><span class="fl">QR</span>\\(A=QR\\): \\(Q\\) orthonormal cols, \\(R\\) upper triangular</div>
<div class="fr"><span class="fl">R entries</span>\\(R_{jk}=\\mathbf{q}_j^\\top\\mathbf{a}_k\\); zero for \\(j>k\\)</div>
<div class="fr"><span class="fl">Solve via QR</span>\\(QR\\mathbf{x}=\\mathbf{b}\\implies R\\mathbf{x}=Q^\\top\\mathbf{b}\\)</div>
<div class="fr"><span class="fl">Stability</span>QR condition number \\(\\kappa(R)=\\kappa(A)\\) vs \\(\\kappa(A)^2\\) for normal eqns</div>
</div>`,
der:[
["GS step","Project v_k onto each previous q_j (gives the overlap), subtract them all, normalise the residual."],
["R upper-triangular","R_{jk}=q_j·a_k. For j>k: q_j was built orthogonal to span(a_1,...,a_k), so R_{jk}=0."],
["Why QR beats normal equations","Normal equations: condition number of AᵀA = κ(A)². QR: condition number of R = κ(A). Squaring halves the digits of accuracy."]
],
code:`import numpy as np

def gram_schmidt(A):
    m, n = A.shape
    Q = np.zeros_like(A, dtype=float)
    for k in range(n):
        q = A[:, k].astype(float)
        for j in range(k):
            q -= np.dot(Q[:, j], A[:, k]) * Q[:, j]
        Q[:, k] = q / np.linalg.norm(q)
    return Q, Q.T @ A

A = np.array([[1.,1.,0.],[1.,0.,1.],[0.,1.,1.]])
Q, R = gram_schmidt(A)
print("QᵀQ=I:", np.allclose(Q.T@Q, np.eye(3)))
print("R upper:", np.allclose(R, np.triu(R)))
print("QR=A:", np.allclose(Q@R, A))

# NumPy QR (Householder — more stable)
Q2, R2 = np.linalg.qr(A)

# Least squares via QR
def solve_ls_qr(A, b):
    Q, R = np.linalg.qr(A)
    return np.linalg.solve(R, Q.T @ b)

X=np.random.randn(10,3); y=np.random.randn(10)
w=solve_ls_qr(X,y)
print("residual:", np.linalg.norm(X@w-y).round(6))`,

(A) not κ(A)²</text></svg>`,

dd:`<div class="ddw"><h3>Householder vs Gram-Schmidt</h3><p>Classical Gram-Schmidt is conceptually clear but numerically fragile — subtracting nearly parallel vectors amplifies errors. Modified GS is better but still \\(O(mn^2)\\). Householder reflections: each step uses \\(H=I-2\\mathbf{u}\\mathbf{u}^\\top\\) (orthogonal) to zero a column below the diagonal. Backward-stable — errors bounded by the problem's condition number. NumPy's <code>linalg.qr</code>, LAPACK's DGEQRF, and PyTorch's <code>torch.linalg.qr</code> all use Householder.</p></div>`
},

{t:4,n:1,title:"Vector & Matrix Norms",
ai:"Gradient clipping in LLM training clips the gradient if \\(\\|\\mathbf{g}\\|_2>\\tau\\). L2 regularisation adds \\(\\lambda\\|\\mathbf{w}\\|_2^2\\) to the loss. L1 regularisation (LASSO) adds \\(\\lambda\\|\\mathbf{w}\\|_1\\) and promotes sparsity. The spectral norm of a weight matrix (largest singular value) controls Lipschitz constants in GAN training.",
pe:"A <strong>norm</strong> measures the 'size' or 'length' of a vector or matrix. Different norms capture different notions of size. They determine regularisation, gradient clipping, and convergence guarantees.",
int:"Different norms are like different rulers. The L2 norm is the Euclidean ruler — the straight-line distance. The L1 norm is the 'Manhattan distance' ruler — counting blocks. The L∞ norm is the 'size of the biggest step' ruler. For matrices, the Frobenius norm is 'flatten to a vector, then take L2'.",
form:`<div class="fb">
<div class="fr"><span class="fl">Lp norm</span>\\(\\|\\mathbf{v}\\|_p=\\left(\\sum_i|v_i|^p\\right)^{1/p}\\) for \\(p\\geq1\\)</div>
<div class="fr"><span class="fl">L1</span>\\(\\|\\mathbf{v}\\|_1=\\sum_i|v_i|\\) (Manhattan, promotes sparsity)</div>
<div class="fr"><span class="fl">L2</span>\\(\\|\\mathbf{v}\\|_2=\\sqrt{\\sum_i v_i^2}\\) (Euclidean)</div>
<div class="fr"><span class="fl">L∞</span>\\(\\|\\mathbf{v}\\|_\\infty=\\max_i|v_i|\\) (max entry)</div>
<div class="fr"><span class="fl">Frobenius</span>\\(\\|A\\|_F=\\sqrt{\\sum_{i,j}A_{ij}^2}=\\sqrt{\\text{tr}(A^\\top A)}\\)</div>
<div class="fr"><span class="fl">Spectral</span>\\(\\|A\\|_2=\\sigma_1(A)\\) (largest singular value)</div>
</div>`,
der:[
["Norm axioms","Three axioms: (1) \\(\\|\\mathbf{v}\\|\\geq0\\), equal iff \\(\\mathbf{v}=\\mathbf{0}\\); (2) \\(\\|c\\mathbf{v}\\|=|c|\\|\\mathbf{v}\\|\\); (3) \\(\\|\\mathbf{u}+\\mathbf{v}\\|\\leq\\|\\mathbf{u}\\|+\\|\\mathbf{v}\\|\\) (triangle inequality)."],
["L1 vs L2 regularisation","L2 reg shrinks all weights proportionally (ridge regression). L1 reg drives small weights exactly to zero (LASSO) because the L1 unit ball has corners at the axes. Geometrically: the regularisation constraint set is a ball in the respective norm; the L1 ball has corners that tend to 'catch' the optimum at axis-aligned points (sparse solutions)."],
["Frobenius vs spectral","Frobenius: \\(\\|A\\|_F^2=\\sum\\sigma_i^2\\) (sum of squared singular values). Spectral: \\(\\|A\\|_2=\\sigma_1\\) (largest singular value). Frobenius is easier to compute; spectral controls the Lipschitz constant of the linear map."],
["Gradient clipping","If \\(\\|\\mathbf{g}\\|_2>\\tau\\), rescale: \\(\\mathbf{g}\\leftarrow\\mathbf{g}\\cdot\\tau/\\|\\mathbf{g}\\|_2\\). This keeps the direction but caps the magnitude at \\(\\tau\\), preventing exploding gradients without zeroing out the gradient entirely."]
],
code:`import numpy as np

v = np.array([3., -4., 0., 2.])

print("L1:", np.linalg.norm(v, 1))   # 3+4+0+2 = 9
print("L2:", np.linalg.norm(v, 2))   # sqrt(9+16+4)=sqrt(29)
print("Linf:", np.linalg.norm(v, np.inf))  # 4

A = np.array([[1.,2.],[3.,4.]])

print("Frobenius:", np.linalg.norm(A, 'fro'))   # sqrt(1+4+9+16)=sqrt(30)
print("Spectral:", np.linalg.norm(A, 2))         # largest singular value

# Verify: Frobenius = sqrt(sum of squared singular values)
s = np.linalg.svd(A, compute_uv=False)
print("Frob via SVD:", np.sqrt(np.sum(s**2)).round(6))

# Gradient clipping
def clip_grad(g, max_norm=1.0):
    norm = np.linalg.norm(g)
    if norm > max_norm:
        g = g * max_norm / norm
    return g

g = np.array([0.1, 10., -5., 0.3])
g_clipped = clip_grad(g, max_norm=1.0)
print("Original norm:", np.linalg.norm(g).round(3))     # 11.22
print("Clipped norm:", np.linalg.norm(g_clipped).round(3))  # 1.0

# L1 sparsity promotion
from numpy.linalg import norm
w = np.array([0.01, 0.5, 0.001, 0.3])
l1 = norm(w, 1)   # penalises all, drives small ones to 0
l2 = norm(w, 2)   # penalises proportionally, never exactly 0

dd:`<div class="ddw"><h3>Spectral Normalisation in GANs</h3><p>In GAN training, the discriminator's Lipschitz constant controls training stability. Spectral normalisation (Miyato et al. 2018) divides each weight matrix W by its spectral norm \\(\\|W\\|_2=\\sigma_1(W)\\), making every linear layer 1-Lipschitz. The spectral norm is estimated cheaply using power iteration (iterating \\(u\\leftarrow Wv/\\|Wv\\|\\), \\(v\\leftarrow W^\\top u/\\|W^\\top u\\|\\)) rather than a full SVD, making it practical during training. PyTorch implements this as <code>torch.nn.utils.spectral_norm</code>.</p></div>`
},
{t:4,n:2,title:"Matrix Inverse",
ai:"The normal equations for linear regression use \\((X^\\top X)^{-1}X^\\top\\mathbf{y}\\). Ridge regression adds \\(\\lambda I\\) to make \\(X^\\top X+\\lambda I\\) always invertible. Understanding when matrices are invertible and how inverses interact is essential for deriving closed-form solutions and understanding conditioning.",
pe:"The <strong>inverse</strong> \\(A^{-1}\\) of a square matrix \\(A\\) satisfies \\(A^{-1}A=AA^{-1}=I\\). It exists iff \\(A\\) is full rank (no zero eigenvalues, det\\(\\neq0\\)). It represents 'undoing' the transformation \\(A\\).",
int:"If matrix \\(A\\) rotates-and-stretches a vector, then \\(A^{-1}\\) un-rotates and un-stretches it back. If \\(A\\) squishes all of 3D space into a plane (rank-deficient), there's no way to undo it — the inverse doesn't exist because multiple inputs map to the same output.",
form:`<div class="fb">
<div class="fr"><span class="fl">Definition</span>\\(A^{-1}A=AA^{-1}=I_n\\) for square \\(A\\in\\mathbb{R}^{n\\times n}\\)</div>
<div class="fr"><span class="fl">Existence</span>\\(A^{-1}\\) exists iff \\(\\det(A)\\neq0\\) iff rank\\((A)=n\\)</div>
<div class="fr"><span class="fl">2×2 formula</span>\\(\\begin{pmatrix}a&b\\\\c&d\\end{pmatrix}^{-1}=\\frac{1}{ad-bc}\\begin{pmatrix}d&-b\\\\-c&a\\end{pmatrix}\\)</div>
<div class="fr"><span class="fl">Product rule</span>\\((AB)^{-1}=B^{-1}A^{-1}\\)</div>
<div class="fr"><span class="fl">Condition no.</span>\\(\\kappa(A)=\\|A\\|\\|A^{-1}\\|=\\sigma_1/\\sigma_n\\); large \\(\\kappa\\) = ill-conditioned</div>
</div>`,
der:[
["Why \\((AB)^{-1}=B^{-1}A^{-1}\\)","\\((AB)(B^{-1}A^{-1})=A(BB^{-1})A^{-1}=AIA^{-1}=I\\). So \\(B^{-1}A^{-1}\\) is the right inverse of \\(AB\\); for square matrices, right inverse = inverse."],
["Condition number intuition","If \\(A\\mathbf{x}=\\mathbf{b}\\), a small perturbation \\(\\delta\\mathbf{b}\\) causes perturbation \\(\\delta\\mathbf{x}=A^{-1}\\delta\\mathbf{b}\\). The relative error amplification: \\(\\|\\delta\\mathbf{x}\\|/\\|\\mathbf{x}\\|\\leq\\kappa(A)\\cdot\\|\\delta\\mathbf{b}\\|/\\|\\mathbf{b}\\|\\). Large \\(\\kappa\\) means tiny input errors lead to huge output errors."],
["Ridge regression trick","\\(X^\\top X\\) may be singular when \\(m<n\\) or features are collinear. Adding \\(\\lambda I\\): eigenvalues of \\(X^\\top X+\\lambda I=\\sigma_i^2+\\lambda>0\\) for all \\(i\\) (since \\(\\lambda>0\\)). Always invertible. Condition number: \\(\\kappa=(\\sigma_1^2+\\lambda)/(\\sigma_n^2+\\lambda)\\) — \\(\\lambda\\) caps the condition number."]
],
code:`import numpy as np

# 2x2 inverse by formula
A = np.array([[2., 1.],
              [5., 3.]])
det = A[0,0]*A[1,1] - A[0,1]*A[1,0]
A_inv_manual = (1/det) * np.array([[A[1,1], -A[0,1]],
                                    [-A[1,0], A[0,0]]])
print("Manual inv:\n", A_inv_manual)
print("NumPy inv:\n", np.linalg.inv(A))
print("A @ A_inv = I?", np.allclose(A @ np.linalg.inv(A), np.eye(2)))

# Condition number
print("kappa(A):", np.linalg.cond(A))

# Ill-conditioned matrix
A_ill = np.array([[1., 1.],
                  [1., 1.+1e-10]])
print("kappa(ill):", np.linalg.cond(A_ill))   # huge!

# Ridge regression: (XᵀX + lambda*I)^(-1) always exists
X = np.random.randn(5, 10)   # n > m: XᵀX is rank 5, not invertible
XtX = X.T @ X
try:
    np.linalg.inv(XtX)
except np.linalg.LinAlgError as e:
    print("XᵀX singular:", e)

lam = 0.1
XtX_reg = XtX + lam * np.eye(10)
print("(XᵀX+λI) invertible:", np.allclose(
    XtX_reg @ np.linalg.inv(XtX_reg), np.eye(10)))
print("kappa(regularised):", np.linalg.cond(XtX_reg).round(2))`,

dd:`<div class="ddw"><h3>Sherman-Morrison-Woodbury Identity</h3><p>The Woodbury identity states \\((A+UCV)^{-1}=A^{-1}-A^{-1}U(C^{-1}+VA^{-1}U)^{-1}VA^{-1}\\). When \\(A\\) is \\(n\\times n\\) and \\(U,V^\\top\\) are \\(n\\times k\\) with \\(k\\ll n\\), computing the right side requires only \\(O(n^2+k^3)\\) rather than \\(O(n^3)\\). This is used in Gaussian process inference (kernel matrix updates), incremental SVD, and deriving ridge regression from the dual problem. The special case \\(k=1\\) is the Sherman-Morrison formula, used in quasi-Newton optimisers like L-BFGS to update Hessian approximations cheaply.</p></div>`

ai:"The Moore-Penrose pseudo-inverse \\(A^+\\) gives the minimum-norm least-squares solution to \\(A\\mathbf{x}=\\mathbf{b}\\). In neural networks, the pseudo-inverse of the Jacobian appears in natural gradient methods. PyTorch's <code>torch.linalg.lstsq</code> computes it via SVD.",
pe:"The <strong>pseudo-inverse</strong> \\(A^+\\) extends the matrix inverse to non-square and rank-deficient matrices. It finds the solution to \\(A\\mathbf{x}=\\mathbf{b}\\) that minimises both the residual \\(\\|A\\mathbf{x}-\\mathbf{b}\\|\\) and, among those, minimises \\(\\|\\mathbf{x}\\|\\).",
int:"The pseudo-inverse finds the 'best' solution when a perfect one doesn't exist. Imagine hitting a target with a noisy GPS: you can't pinpoint the exact location, but you can find the position that best explains the readings while keeping your estimate as conservative (small) as possible.",
form:`<div class="fb">
<div class="fr"><span class="fl">SVD form</span>\\(A^+=V\\Sigma^+U^\\top\\) where \\(\\Sigma^+_{ii}=1/\\sigma_i\\) if \\(\\sigma_i>0\\), else 0</div>
<div class="fr"><span class="fl">Properties</span>\\(AA^+A=A\\), \\(A^+AA^+=A^+\\), both \\(AA^+\\) and \\(A^+A\\) symmetric</div>
<div class="fr"><span class="fl">Full col rank</span>\\(A^+=(A^\\top A)^{-1}A^\\top\\) (left inverse)</div>
<div class="fr"><span class="fl">Full row rank</span>\\(A^+=A^\\top(AA^\\top)^{-1}\\) (right inverse)</div>
<div class="fr"><span class="fl">Min-norm LS</span>\\(\\hat{\\mathbf{x}}=A^+\\mathbf{b}\\) minimises \\(\\|\\mathbf{x}\\|\\) among all LS solutions</div>
</div>`,
der:[
["SVD derivation of pseudo-inverse","\\(A=U\\Sigma V^\\top\\). For \\(A\\mathbf{x}=\\mathbf{b}\\): \\(U\\Sigma V^\\top\\mathbf{x}=\\mathbf{b}\\implies\\Sigma(V^\\top\\mathbf{x})=U^\\top\\mathbf{b}\\). Let \\(\\mathbf{y}=V^\\top\\mathbf{x}\\), \\(\\mathbf{c}=U^\\top\\mathbf{b}\\). For singular values \\(\\sigma_i>0\\): \\(y_i=c_i/\\sigma_i\\). For \\(\\sigma_i=0\\): set \\(y_i=0\\) (minimum norm). Then \\(\\mathbf{x}=V\\mathbf{y}=V\\Sigma^+U^\\top\\mathbf{b}=A^+\\mathbf{b}\\)."],
["Why minimum norm","The null space of \\(A\\) contributes nothing to \\(A\\mathbf{x}\\). Setting the null space component to zero (which is what \\(A^+\\mathbf{b}\\) does) gives the minimum-norm solution."],
["LS when full column rank","If \\(A\\) has full column rank (\\(m>n\\), rank=n), \\(A^+=(A^\\top A)^{-1}A^\\top\\) — the familiar normal-equation solution. This is exact least squares with a unique solution."]
],
code:`import numpy as np

# Moore-Penrose pseudo-inverse
A = np.array([[1., 2.],
              [3., 4.],
              [5., 6.]])   # (3,2): overdetermined

A_plus = np.linalg.pinv(A)
print("A+ shape:", A_plus.shape)  # (2,3)
print("A+@A = I?", np.allclose(A_plus @ A, np.eye(2)))  # True (left inv)
print("A@A+ = proj?", np.allclose(A@A_plus, (A@A_plus).T))  # symmetric

b = np.array([7., 8., 9.])
x_ls = A_plus @ b    # least squares solution
print("LS solution:", x_ls.round(4))
print("Residual:", np.linalg.norm(A @ x_ls - b).round(4))

# Manual pseudo-inverse via SVD
def pinv_manual(A, tol=1e-10):
    U, s, Vt = np.linalg.svd(A, full_matrices=False)
    s_inv = np.where(s > tol, 1./s, 0.)
    return Vt.T @ np.diag(s_inv) @ U.T

A_plus_manual = pinv_manual(A)
print("Manual pinv matches?", np.allclose(A_plus_manual, A_plus))

# Underdetermined: minimum norm solution
B = np.array([[1., 0., 1.],
              [0., 1., 1.]])  # (2,3): underdetermined
c = np.array([1., 1.])
x_min_norm = np.linalg.pinv(B) @ c
print("Min-norm solution:", x_min_norm.round(4))  # smallest ||x||
print("||x||:", np.linalg.norm(x_min_norm).round(4))`,

dd:`<div class="ddw"><h3>Pseudo-Inverse in Natural Gradient Methods</h3><p>The natural gradient method (Amari 1998) replaces the ordinary gradient \\(\\mathbf{g}\\) with \\(F^{-1}\\mathbf{g}\\) where \\(F\\) is the Fisher information matrix. For large models, \\(F\\) is intractable to invert exactly, so approximations (Kronecker-factored KFAC, by Martens & Grosse 2015) compute block-diagonal pseudo-inverses. The key insight: in parameter spaces with a natural geometry (defined by the model's probability distribution), the pseudo-inverse of \\(F\\) provides the steepest descent direction that is invariant to reparametrisation — ordinary gradient descent is not invariant, which is why it's sensitive to layer scaling and feature magnitudes.</p></div>`
},
{t:4,n:4,title:"LU Decomposition",
ai:"PyTorch's <code>torch.linalg.solve</code> uses LU decomposition with partial pivoting (via LAPACK's DGESV). LU is also used in computing the log-determinant of a matrix — required in Gaussian likelihoods and normalising flows — stably as \\(\\log|\\det A|=\\sum_i\\log|U_{ii}|\\).",
pe:"<strong>LU decomposition</strong> factors \\(A=LU\\) (or \\(PA=LU\\) with pivoting), where \\(L\\) is lower-triangular and \\(U\\) is upper-triangular. It compactly stores the result of Gaussian elimination and allows multiple right-hand sides to be solved cheaply.",
int:"Think of LU as pre-computing the 'work' of elimination once and then reusing it. If you need to solve \\(A\\mathbf{x}=\\mathbf{b}_1\\), \\(A\\mathbf{x}=\\mathbf{b}_2\\), \\(A\\mathbf{x}=\\mathbf{b}_3\\) with the same \\(A\\), LU factors \\(A\\) once (\\(O(n^3)\\)) and each new right-hand side costs only \\(O(n^2)\\).",
form:`<div class="fb">
<div class="fr"><span class="fl">Factorisation</span>\\(PA=LU\\): \\(P\\) permutation, \\(L\\) unit lower-triangular, \\(U\\) upper-triangular</div>
<div class="fr"><span class="fl">L entries</span>\\(L_{ij}=m_{ij}\\) (the multipliers from elimination) for \\(i>j\\); \\(L_{ii}=1\\)</div>
<div class="fr"><span class="fl">U entries</span>Row echelon form of \\(PA\\)</div>
<div class="fr"><span class="fl">Solve</span>\\(PA\\mathbf{x}=P\\mathbf{b}\\implies L\\mathbf{y}=P\\mathbf{b}\\) then \\(U\\mathbf{x}=\\mathbf{y}\\)</div>
<div class="fr"><span class="fl">Determinant</span>\\(\\det A=\\det(P^{-1})\\cdot\\prod_i U_{ii}\\)</div>
</div>`,
der:[
["L stores multipliers","Elimination step: \\(R_i\\leftarrow R_i-m_{ij}R_j\\). Store \\(m_{ij}\\) in \\(L_{ij}\\). The forward substitution \\(L\\mathbf{y}=\\mathbf{b}\\) then reverses these operations."],
["Verify \\(LU=A\\)","Row 1 of \\(U\\) = row 1 of \\(A\\). Row 2 of \\(A\\) was modified: \\(A_2-m_{21}A_1=U_2\\) → \\(A_2=U_2+m_{21}U_1=L_{21}U_1+1\\cdot U_2\\) = (row 2 of \\(LU\\)). ✓"],
["Log-determinant for normalising flows","\\(\\log|\\det A|=\\sum_i\\log|U_{ii}|\\) (sum over diagonal of \\(U\\)). Normalising flows need to compute log|det J| (log absolute Jacobian determinant) at every forward pass. Using LU makes this \\(O(n)\\) once factored."]
],
code:`import numpy as np
from scipy import linalg

A = np.array([[2., 1., 5.],
              [4., 4., 2.],
              [1., 2., 6.]])

# SciPy LU decomposition
P, L, U = linalg.lu(A)
print("P:\n", P)
print("L:\n", L.round(4))
print("U:\n", U.round(4))
print("PLU=A?", np.allclose(P @ L @ U, A))

# Solve Ax = b via LU (multiple RHS)
bs = [np.array([1.,2.,3.]),
      np.array([4.,5.,6.]),
      np.array([7.,8.,9.])]

lu_factor = linalg.lu_factor(A)  # factorize once
for b in bs:
    x = linalg.lu_solve(lu_factor, b)  # O(n²) each
    print(f"x={x.round(4)}, verify={np.allclose(A@x, b)}")

# Log-determinant via LU (numerically stable)
def log_det(A):
    _, _, U = linalg.lu(A)
    return np.sum(np.log(np.abs(np.diag(U))))

print("log|det(A)|:", log_det(A).round(6))
print("Direct check:", np.log(np.abs(np.linalg.det(A))).round(6))`,

dd:`<div class="ddw"><h3>Log-Determinant in Normalising Flows</h3><p>Normalising flows transform a simple distribution \\(p_Z(\\mathbf{z})\\) into a complex one \\(p_X(\\mathbf{x})\\) via an invertible map \\(f\\): \\(\\log p_X(\\mathbf{x})=\\log p_Z(f^{-1}(\\mathbf{x}))+\\log|\\det J_{f^{-1}}(\\mathbf{x})|\\). The log-Jacobian-determinant must be computed at every training step. LU-based flows (Kingma & Dhariwal 2018) parameterise the transformation matrix as \\(W=PLU\\) with constrained triangular factors, making \\(\\log|\\det W|=\\sum_i\\log|U_{ii}|\\) computable in \\(O(n)\\). This makes normalising flows tractable for high-dimensional density estimation.</p></div>`
},
{t:4,n:5,title:"Eigenvalues & Introduction to SVD",
ai:"PCA uses eigenvalues of the covariance matrix. SVD is the engine behind dimensionality reduction, low-rank approximation (LoRA), matrix completion (collaborative filtering), and computing the spectral norm of weight matrices. The transformer's attention is related to power iteration for the dominant eigenvector.",
pe:"An <strong>eigenvalue</strong> \\(\\lambda\\) and <strong>eigenvector</strong> \\(\\mathbf{v}\\) satisfy \\(A\\mathbf{v}=\\lambda\\mathbf{v}\\): the matrix only scales \\(\\mathbf{v}\\), not changes its direction. <strong>SVD</strong> decomposes any matrix into three: two rotation matrices and a stretching.",
int:"Eigenvectors are the 'natural axes' of a transformation — the directions that don't get rotated, only stretched. SVD finds the natural axes of any matrix (even non-square), not just square symmetric ones. Think of SVD as finding the ellipse that a unit sphere maps to: the singular values are the axis lengths.",
form:`<div class="fb">
<div class="fr"><span class="fl">Eigenvalue eq.</span>\\(A\\mathbf{v}=\\lambda\\mathbf{v}\\), equivalently \\((A-\\lambda I)\\mathbf{v}=\\mathbf{0}\\)</div>
<div class="fr"><span class="fl">Characteristic</span>\\(\\det(A-\\lambda I)=0\\) — polynomial of degree \\(n\\)</div>
<div class="fr"><span class="fl">SVD</span>\\(A=U\\Sigma V^\\top\\): \\(U\\in\\mathbb{R}^{m\\times m}\\) orthogonal, \\(\\Sigma\\geq0\\) diagonal, \\(V\\in\\mathbb{R}^{n\\times n}\\) orthogonal</div>
<div class="fr"><span class="fl">Singular values</span>\\(\\sigma_i=\\sqrt{\\lambda_i(A^\\top A)}\\geq0\\), sorted descending</div>
<div class="fr"><span class="fl">Rank</span>\\(\\text{rank}(A)=\\) number of positive singular values</div>
</div>`,
der:[
["Eigenvalue existence","For \\((A-\\lambda I)\\mathbf{v}=\\mathbf{0}\\) to have non-trivial solutions, \\(A-\\lambda I\\) must be singular: \\(\\det(A-\\lambda I)=0\\). This is a degree-\\(n\\) polynomial in \\(\\lambda\\) (characteristic polynomial) with \\(n\\) roots (possibly complex)."],
["SVD derivation idea","\\(A^\\top A\\) is symmetric positive semi-definite, so it has an eigen-decomposition \\(A^\\top A=V\\Lambda V^\\top\\) with \\(\\Lambda=\\text{diag}(\\sigma_1^2,\\ldots,\\sigma_n^2)\\). Define \\(U_i=A\\mathbf{v}_i/\\sigma_i\\) (for \\(\\sigma_i>0\\)). These are orthonormal: \\(U_i^\\top U_j=(A\\mathbf{v}_i/\\sigma_i)^\\top(A\\mathbf{v}_j/\\sigma_j)=\\mathbf{v}_i^\\top A^\\top A\\mathbf{v}_j/(\\sigma_i\\sigma_j)=\\sigma_j^2\\delta_{ij}/(\\sigma_i\\sigma_j)=\\delta_{ij}\\). Collecting: \\(A=U\\Sigma V^\\top\\)."],
["Relationship to eigenvalues","Left singular vectors of \\(A\\) = eigenvectors of \\(AA^\\top\\). Right singular vectors = eigenvectors of \\(A^\\top A\\). Singular values = square roots of eigenvalues of \\(A^\\top A\\)."]
],
code:`import numpy as np

# Eigendecomposition (square matrix)
A = np.array([[4., 1.],
              [2., 3.]])
eigenvalues, eigenvectors = np.linalg.eig(A)
print("Eigenvalues:", eigenvalues)      # [5. 2.]
print("Eigenvectors (cols):\n", eigenvectors)
# Verify: A @ v = lambda * v
for i in range(2):
    v = eigenvectors[:, i]
    lam = eigenvalues[i]
    print(f"A@v{i}={A@v.round(4)}, λv{i}={lam*v.round(4)}")

# SVD
M = np.array([[1., 2., 3.],
              [4., 5., 6.]])   # (2,3)
U, s, Vt = np.linalg.svd(M, full_matrices=False)
print("U shape:", U.shape)   # (2,2) for econ SVD
print("s:", s.round(4))      # singular values
print("Vt shape:", Vt.shape) # (2,3)

# Verify reconstruction
Sigma = np.diag(s)
print("U @ Sigma @ Vt = M?", np.allclose(U @ Sigma @ Vt, M))

# Rank via SVD
print("rank(M):", np.sum(s > 1e-10))  # 2

# Relationship: singular values of A = sqrt(eigenvalues of AᵀA)
AtA = M.T @ M
eigs = np.linalg.eigvalsh(AtA)  # symmetric eigenvalues
print("sqrt(eigs of AᵀA):", np.sort(np.sqrt(eigs[eigs>1e-10]))[::-1].round(4))
print("Singular values:   ", s.round(4))  # same!`,

dd:`<div class="ddw"><h3>The Eckart-Young Theorem: Best Low-Rank Approximation</h3><p>Among all rank-\\(k\\) matrices, the closest to \\(A\\) in Frobenius (or spectral) norm is \\(A_k=\\sum_{i=1}^k\\sigma_i\\mathbf{u}_i\\mathbf{v}_i^\\top\\) — the truncated SVD. This is the Eckart-Young theorem (1936). The approximation error is \\(\\|A-A_k\\|_F=\\sqrt{\\sum_{i>k}\\sigma_i^2}\\). This theorem justifies LoRA: a weight update \\(\\Delta W\\) can be approximated by \\(\\Delta W_r=B_r A_r\\) where \\(B_r,A_r\\) have rank \\(r\\), and the approximation error is controlled by the \\((r+1)\\)th singular value of \\(\\Delta W\\). If \\(\\Delta W\\) has fast-decaying singular values (common in practice), this approximation is nearly lossless.</p></div>`
},

ai:"The transformer's self-attention, as shown by Dong et al. (2021), converges to a rank-1 matrix under repeated application — the dominant eigenvector problem. PCA finds the top-k eigenvectors of the covariance matrix. The stability of gradient descent depends on the largest eigenvalue of the Hessian (sharpness).",
pe:"An eigenvector is a special direction that a matrix only scales, not rotates. The eigenvalue is the scale factor. They are the 'natural axes' of a linear transformation.",
int:"Imagine repeatedly applying a matrix A to a random vector. Like a sieve, most random directions get rotated, but the eigenvector directions only get stretched or flipped. Apply A enough times, and any initial vector aligns with the dominant eigenvector (the one with largest |λ|). This is power iteration.",
form:`<div class="fb">
<div class="fr"><span class="fl">Eigen equation</span>\\(A\\mathbf{v}=\\lambda\\mathbf{v}\\), \\(\\mathbf{v}\\neq\\mathbf{0}\\)</div>

<div class="fr"><span class="fl">Trace & det</span>\\(\\text{tr}(A)=\\sum_i\\lambda_i\\), \\(\\det(A)=\\prod_i\\lambda_i\\)</div>

der:[
["Trace = sum of eigenvalues","tr(A)=Σλᵢ. Proof: the characteristic polynomial is ∏(λᵢ-λ). The coefficient of λⁿ⁻¹ is -Σλᵢ; it's also -tr(A) from expanding det(A-λI)."],
["det = product of eigenvalues","det(A)=∏λᵢ. Proof: set λ=0 in char polynomial: det(A)=∏λᵢ."],
["Power iteration convergence","If |λ₁|>|λ₂|≥…, then A^t v / ‖A^t v‖ → v₁ at rate |λ₂/λ₁|^t. After t steps the component in direction v₁ dominates since it grows as λ₁^t vs λ₂^t for others."],
["Gradient descent and sharpness","The loss Hessian H has eigenvalues λ₁≥…≥λₙ. GD with step size η converges iff η<2/λ₁ (largest eigenvalue = sharpness). With adaptive methods (Adam), the effective step size is normalised per-dimension — indirectly controlling sharpness."]
],
code:`import numpy as np

A = np.array([[3., 1.],
              [0., 2.]])   # upper triangular: eigenvalues on diagonal

eigs, vecs = np.linalg.eig(A)
print("Eigenvalues:", eigs)   # [3. 2.]
print("tr(A):", A.trace(), "= sum(λ):", sum(eigs))
print("det(A):", np.linalg.det(A).round(2), "= prod(λ):", np.prod(eigs))

# Power iteration (dominant eigenvector)
def power_iteration(A, n_iter=100):
    v = np.random.randn(A.shape[0])
    for _ in range(n_iter):
        v = A @ v
        v = v / np.linalg.norm(v)
    eigenvalue = v @ A @ v    # Rayleigh quotient
    return v, eigenvalue

B = np.array([[4., 1.],
              [1., 3.]])  # symmetric: real eigenvalues
v_dom, lam_dom = power_iteration(B)
print("Power iter eigenvec:", v_dom.round(4))
print("Power iter eigenval:", lam_dom.round(4))
# Verify
print("NumPy eigs:", np.linalg.eigvalsh(B))

# Attention convergence: repeated self-attention → rank-1?
T, d = 6, 8
A_attn = np.random.randn(T, d)
for _ in range(10):
    scores = A_attn @ A_attn.T / np.sqrt(d)
    weights = np.exp(scores) / np.exp(scores).sum(-1, keepdims=True)
    A_attn = weights @ A_attn  # value aggregation
print("Rank after 10 steps:", np.linalg.matrix_rank(A_attn, tol=0.01))`,

dd:`<div class="ddw"><h3>Rayleigh Quotient and Variational Characterisation</h3><p>The Rayleigh quotient \\(R(\\mathbf{v})=\\mathbf{v}^\\top A\\mathbf{v}/\\mathbf{v}^\\top\\mathbf{v}\\) is a scalar function of \\(\\mathbf{v}\\). For symmetric A, \\(\\max_\\mathbf{v}R(\\mathbf{v})=\\lambda_1\\) (achieved at \\(\\mathbf{v}=\\mathbf{v}_1\\)) and \\(\\min_\\mathbf{v}R(\\mathbf{v})=\\lambda_n\\). This variational characterisation is the basis for PCA: the first PC maximises the Rayleigh quotient of the covariance matrix. The gradient of \\(R(\\mathbf{v})\\) points toward the dominant eigenvector, explaining why gradient ascent on the Rayleigh quotient (= power iteration) finds the largest eigenvalue.</p></div>`
},

code:`import numpy as np

A = np.array([[4., 1.],
              [2., 3.]])
lam, P = np.linalg.eig(A)
D = np.diag(lam)
P_inv = np.linalg.inv(P)

# Verify A = P D P⁻¹
print("A = PDP⁻¹?", np.allclose(A, P @ D @ P_inv))

# Powers of A via diagonalisation
def matrix_power_eig(A, k):
    lam, P = np.linalg.eig(A)
    D_k = np.diag(lam**k)
    return P @ D_k @ np.linalg.inv(P)

A5 = matrix_power_eig(A, 5)
print("A^5 via eig:", A5.round(2))
print("A^5 numpy:", np.linalg.matrix_power(A, 5))

# Symmetric A: orthogonal P (spectral theorem)
S = np.array([[2., 1.],
              [1., 3.]])
lam_s, P_s = np.linalg.eigh(S)  # eigh for symmetric
print("P orthogonal?", np.allclose(P_s.T @ P_s, np.eye(2)))
print("Eigenvalues:", lam_s)

# RNN stability check
W = np.random.randn(4,4) * 0.3
eigs_W = np.abs(np.linalg.eigvals(W))
print("Max |λ|:", eigs_W.max().round(4))
print("RNN stable:", eigs_W.max() <= 1)`,

dd:`<div class="ddw"><h3>Defective Matrices and Jordan Form</h3><p>Not every matrix is diagonalisable. A <em>defective</em> matrix has a repeated eigenvalue \\(\\lambda\\) with geometric multiplicity (eigenspace dimension) less than algebraic multiplicity (multiplicity as a root). For example, \\(\\begin{pmatrix}0&1\\\\0&0\\end{pmatrix}\\) has eigenvalue 0 with multiplicity 2 but only a 1-dimensional eigenspace. These matrices can only be put into <em>Jordan normal form</em> — block-diagonal with Jordan blocks. In ML, defective matrices arise in degenerate training dynamics and when analysing rank collapse in attention layers. The Jordan form explains why certain network architectures can have pathological gradient flows.</p></div>`
},
{t:5,n:3,title:"Symmetric Matrices & Positive Definiteness",
ai:"The Hessian of a loss function \\(H=\\nabla^2\\mathcal{L}\\) is symmetric. Positive definiteness (all eigenvalues > 0) certifies a local minimum. Covariance matrices (\\(\\Sigma=X^\\top X/n\\)) are symmetric positive semi-definite. The Fisher information matrix in natural gradient is PSD. Understanding PSD is essential for second-order optimisation and Gaussian models.",
pe:"A symmetric matrix has \\(A=A^\\top\\). A <strong>positive definite</strong> (PD) matrix additionally satisfies \\(\\mathbf{x}^\\top A\\mathbf{x}>0\\) for all nonzero \\(\\mathbf{x}\\). A <strong>positive semi-definite</strong> (PSD) matrix has \\(\\mathbf{x}^\\top A\\mathbf{x}\\geq0\\).",
int:"Think of \\(f(\\mathbf{x})=\\mathbf{x}^\\top A\\mathbf{x}\\). If A is PD, this is a bowl — every direction goes up from the origin. If PSD, it's a bowl that may be flat in some directions. If indefinite, it's a saddle. The eigenvalues tell you: all positive = bowl (minimum), some negative = saddle, all negative = inverted bowl (maximum).",
form:`<div class="fb">
<div class="fr"><span class="fl">Symmetric</span>\\(A=A^\\top\\Leftrightarrow A_{ij}=A_{ji}\\)</div>
<div class="fr"><span class="fl">PD</span>\\(\\mathbf{x}^\\top A\\mathbf{x}>0\\;\\forall\\mathbf{x}\\neq\\mathbf{0}\\Leftrightarrow\\) all eigenvalues > 0</div>
<div class="fr"><span class="fl">PSD</span>\\(\\mathbf{x}^\\top A\\mathbf{x}\\geq0\\Leftrightarrow\\) all eigenvalues ≥ 0</div>
<div class="fr"><span class="fl">Cholesky</span>\\(A=LL^\\top\\) (\\(L\\) lower triangular with pos. diagonal) iff \\(A\\) is PD</div>
<div class="fr"><span class="fl">Spectral thm.</span>Symmetric \\(A=Q\\Lambda Q^\\top\\), \\(Q\\) orthogonal, \\(\\Lambda=\\text{diag}(\\lambda_i)\\)</div>
</div>`,
der:[
["Eigenvalue characterisation of PD","If A=QΛQᵀ (spectral theorem), then xᵀAx=xᵀQΛQᵀx=(Qᵀx)ᵀΛ(Qᵀx)=Σλᵢyᵢ² where y=Qᵀx. If all λᵢ>0: xᵀAx=Σλᵢyᵢ²>0 for y≠0 (i.e., x≠0). ✓"],
["Covariance is PSD","Σ=XᵀX/n. xᵀΣx=xᵀXᵀXx/n=‖Xx‖²/n≥0. Equality when Xx=0, i.e., x∈null(X). So Σ is PSD; PD iff null(X)={0} i.e., X has full column rank."],
["Hessian and local minima","At a critical point ∇f=0: PD Hessian → local minimum; ND Hessian → local maximum; indefinite → saddle. Loss landscapes of neural networks are typically indefinite (saddle-rich), not locally PD minima in the interior."],
["Cholesky exists iff PD","Cholesky A=LLᵀ requires all leading principal minors to be positive — equivalent to all eigenvalues being positive. Cholesky is used for sampling from multivariate Gaussians: x=Lz, z~N(0,I) gives x~N(0,LLᵀ)=N(0,A)."]
],
code:`import numpy as np

# Create a PD matrix
A = np.array([[4., 2.],
              [2., 3.]])
print("Symmetric?", np.allclose(A, A.T))
eigvals = np.linalg.eigvalsh(A)
print("Eigenvalues:", eigvals)  # all positive → PD
print("PD?", np.all(eigvals > 0))

# Cholesky decomposition
L = np.linalg.cholesky(A)
print("Cholesky L:\n", L.round(4))
print("L @ L.T = A?", np.allclose(L @ L.T, A))

# Covariance matrix is PSD
X = np.random.randn(100, 5)
Sigma = X.T @ X / 100
eigvals_sigma = np.linalg.eigvalsh(Sigma)

print("PSD?", np.all(eigvals_sigma >= -1e-10))

# Sample from N(mu, Sigma) using Cholesky
def sample_mvn(mu, Sigma, n_samples=5):
    L = np.linalg.cholesky(Sigma + 1e-8*np.eye(len(Sigma)))
    Z = np.random.randn(n_samples, len(mu))
    return (L @ Z.T).T + mu

samples = sample_mvn(np.zeros(5), Sigma)
print("Samples shape:", samples.shape)

# Check Hessian at critical point
# f(x,y) = x² + y²  →  H = 2I (PD → minimum)
H = 2 * np.eye(2)
print("Hessian PD?", np.all(np.linalg.eigvalsh(H) > 0))  # True → minimum`,

["SVD derivation","AᵀA is PSD with eigen-decomposition AᵀA=VΛVᵀ, Λ=diag(σ₁²,…,σₙ²), σᵢ≥0. Define u_i=Av_i/σᵢ for σᵢ>0. Check: u_i·u_j=(Av_i)ᵀ(Av_j)/(σᵢσⱼ)=v_iᵀAᵀAv_j/(σᵢσⱼ)=σⱼ²δᵢⱼ/(σᵢσⱼ)=δᵢⱼ. So {u_i} are orthonormal. Extending to a full basis of ℝᵐ: A=UΣVᵀ."],
["Rank-1 sum","A=UΣVᵀ=Σᵢ σᵢuᵢvᵢᵀ (outer products). Each term is rank-1. Summing r such terms gives A (rank ≤ r)."],
["Eckart-Young theorem","Among all rank-k matrices B, ‖A-B‖_F is minimised by Aₖ=Σᵢ₌₁ᵏ σᵢuᵢvᵢᵀ. Proof: by Cauchy interlacing and the unitary invariance of Frobenius norm."],
["PCA connection","PCA of X (mean-centred): SVD X=UΣVᵀ. Principal components = columns of V (loadings). Scores = XV = UΣ. Variance explained by PC k = σₖ²/(Σσᵢ²)."]

code:`import numpy as np

# SVD
M = np.random.randn(4, 6)
U, s, Vt = np.linalg.svd(M, full_matrices=False)
print(f"U:{U.shape}, s:{s.shape}, Vt:{Vt.shape}")

# Verify
Sigma = np.diag(s)
print("Reconstruction:", np.allclose(U @ Sigma @ Vt, M))

# Eckart-Young: best rank-k approximation
def low_rank_approx(M, k):
    U, s, Vt = np.linalg.svd(M, full_matrices=False)
    return U[:, :k] @ np.diag(s[:k]) @ Vt[:k, :]

for k in [1, 2, 3]:
    M_k = low_rank_approx(M, k)
    error = np.linalg.norm(M - M_k, 'fro')
    expected = np.sqrt(sum(s[k:]**2))
    print(f"k={k}: error={error:.4f}, expected={expected:.4f}")

# PCA via SVD
X = np.random.randn(100, 5)
X -= X.mean(axis=0)   # centre
U_x, s_x, Vt_x = np.linalg.svd(X, full_matrices=False)
# Principal component loadings = columns of V
PCs = Vt_x.T   # (5,5) — each column is a PC direction
# Scores (projected data)
scores = X @ PCs
print("Variance explained:", (s_x**2 / sum(s_x**2)).round(3))

# Image compression simulation
img = np.random.randn(64, 64)
for k in [5, 10, 20]:
    img_k = low_rank_approx(img, k)
    compression = k * (64+64+1) / (64*64)
    print(f"k={k}: compression={compression:.2%}")`,

dd:`<div class="ddw"><h3>SVD in Transformer Weight Analysis</h3><p>Aghajanyan et al. (2021) showed that fine-tuning a pre-trained LLM only needs to move in a low-dimensional subspace of the full parameter space — the LoRA hypothesis. To verify this empirically for a given weight matrix W: (1) compute SVD of ΔW=(W_finetuned - W_pretrained); (2) plot the singular value spectrum; (3) check if the top r singular values explain >95% of ‖ΔW‖_F². If yes, a rank-r LoRA adapter would have captured essentially all the fine-tuning signal. This analysis shows that many fine-tuning tasks are intrinsically low-rank in weight space — the key insight that makes parameter-efficient fine-tuning theoretically sound.</p></div>`

ai:"PCA is the workhorse of unsupervised learning: dimensionality reduction, visualisation (t-SNE initialisation), noise removal, latent factor models, and feature extraction. Modern LLM interpretability uses PCA to find 'feature directions' in residual stream activations.",
pe:"<strong>Principal Component Analysis</strong> finds the directions of maximum variance in data. It projects high-dimensional data onto a lower-dimensional subspace that captures as much variance as possible. Mathematically, it's the eigendecomposition of the covariance matrix, or equivalently the SVD of the centred data matrix.",
int:"Imagine a cloud of data points in 3D that happens to lie near a tilted plane. PCA finds that plane — the direction where the data spreads out most. The first PC is the axis of maximum spread; the second is the next most spread (perpendicular to the first); and so on. Dropping the last PCs (low variance) compresses the data with minimal information loss.",
form:`<div class="fb">
<div class="fr"><span class="fl">Covariance</span>\\(\\Sigma=\\frac{1}{n}X^\\top X\\) (\\(X\\) centred)</div>
<div class="fr"><span class="fl">PCA objective</span>\\(\\max_{\\mathbf{w}:\\|\\mathbf{w}\\|=1}\\mathbf{w}^\\top\\Sigma\\mathbf{w}\\)</div>
<div class="fr"><span class="fl">Solution</span>\\(\\mathbf{w}_1^*=\\mathbf{v}_1\\) (top eigenvector of \\(\\Sigma\\))</div>
<div class="fr"><span class="fl">Via SVD</span>\\(X=U\\Sigma V^\\top\\): PCs = columns of \\(V\\), scores = \\(U\\Sigma\\)</div>

der:[
["PCA from first principles","Objective: find unit vector w that maximises variance of projections: max wᵀΣw s.t. wᵀw=1. Lagrangian: max wᵀΣw-λ(wᵀw-1). Gradient: 2Σw-2λw=0 → Σw=λw. So w is an eigenvector of Σ and the variance = λ. Maximum at the top eigenvector."],
["SVD connection","Covariance Σ=XᵀX/n. SVD X=UΣ̃Vᵀ → XᵀX=VΣ̃²Vᵀ/n. So eigenvectors of covariance = columns of V (right singular vectors of X). Eigenvalues of covariance = σ̃ᵢ²/n (squared singular values divided by n)."],
["Whitening","PCA whitening: divide by standard deviation of each PC. Transform z=Λ^{-1/2}Qᵀx. Result: unit variance in every direction. Used in ICA preprocessing and as an alternative to batch normalisation."]
],
code:`import numpy as np

# PCA from scratch
def pca(X, n_components):
    # Centre
    X_c = X - X.mean(axis=0)
    # Covariance
    C = X_c.T @ X_c / len(X)
    # Eigendecomposition
    eigenvalues, eigenvectors = np.linalg.eigh(C)
    # Sort descending
    idx = np.argsort(eigenvalues)[::-1]
    eigenvalues = eigenvalues[idx]
    eigenvectors = eigenvectors[:, idx]
    # Project
    W = eigenvectors[:, :n_components]
    X_proj = X_c @ W
    var_exp = eigenvalues[:n_components] / eigenvalues.sum()
    return X_proj, W, var_exp

# PCA via SVD (equivalent, more numerically stable)
def pca_svd(X, n_components):
    X_c = X - X.mean(axis=0)
    U, s, Vt = np.linalg.svd(X_c, full_matrices=False)
    W = Vt[:n_components].T    # PC directions
    X_proj = X_c @ W           # scores
    var_exp = s[:n_components]**2 / (s**2).sum()
    return X_proj, W, var_exp

# Test
np.random.seed(42)
X = np.random.randn(200, 10)
X[:, 0:2] *= 5   # First 2 features have high variance

proj1, W1, var1 = pca(X, 3)
proj2, W2, var2 = pca_svd(X, 3)
print("Variance explained (eig):", var1.round(3))
print("Variance explained (svd):", var2.round(3))
print("Same result:", np.allclose(np.abs(proj1), np.abs(proj2)))

# Reconstruction error
def reconstruct(X, n_components):
    X_c = X - X.mean(axis=0)
    _, W, _ = pca_svd(X, n_components)
    return X_c @ W @ W.T + X.mean(axis=0)

for k in [2, 5, 8]:
    err = np.linalg.norm(X - reconstruct(X, k), 'fro')
    print(f"k={k}: reconstruction error={err:.2f}")`,
