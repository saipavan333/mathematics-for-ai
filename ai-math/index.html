dd:`<div class="ddw"><h3>PCA in LLM Interpretability</h3><p>Elhage et al. (2022) and others use PCA to find 'feature directions' in transformer residual streams. The key finding: residual stream activations form structured low-dimensional manifolds. PCA of these activations reveals interpretable directions — axes that correspond to sentiment, grammar, world knowledge, etc. This motivates 'linear representation hypothesis': features in LLMs are encoded as linear directions in activation space, and PCA/SVD are the natural tools to find them. Anthropic's monosemanticity work (2023) further decomposes these directions into individual 'features' using sparse autoencoders, which are themselves a form of overcomplete PCA.</p></div>`
},
{t:5,n:6,title:"Low-Rank Approximation & LoRA",
ai:"LoRA (Low-Rank Adaptation, Hu et al. 2021) freezes pre-trained weights \\(W_0\\) and adds a trainable rank-\\(r\\) decomposition \\(\\Delta W=BA\\). Combined weight: \\(W=W_0+BA\\). This reduces trainable parameters from \\(d^2\\) to \\(2rd\\) (e.g., 99.6% reduction for GPT-3 scale). The Eckart-Young theorem guarantees this is nearly optimal if \\(\\Delta W\\) has low intrinsic rank.",
pe:"<strong>Low-rank approximation</strong> replaces a matrix with a nearby matrix of smaller rank, reducing storage and compute. LoRA applies this to neural network fine-tuning: instead of updating all weights, update only a low-rank perturbation.",
int:"A \\(d\\times d\\) weight matrix has \\(d^2\\) entries. But if the 'update' you need to make lives mostly in a \\(r\\)-dimensional subspace (\\(r\\ll d\\)), you only need \\(r\\cdot d+r\\cdot d=2rd\\) numbers — much less. LoRA is the practical exploitation of this low-rank structure that the Eckart-Young theorem proves is optimal.",
form:`<div class="fb">
<div class="fr"><span class="fl">LoRA param.</span>\\(W=W_0+\\frac{\\alpha}{r}BA\\), \\(B\\in\\mathbb{R}^{d\\times r}\\), \\(A\\in\\mathbb{R}^{r\\times d}\\), \\(r\\ll d\\)</div>
<div class="fr"><span class="fl">Init.</span>\\(A\\sim\\mathcal{N}(0,\\sigma^2)\\), \\(B=0\\) → \\(\\Delta W=0\\) at init</div>
<div class="fr"><span class="fl">Params</span>\\(2rd\\) vs \\(d^2\\); reduction factor \\(d/(2r)\\)</div>
<div class="fr"><span class="fl">Merged</span>At inference: merge \\(W=W_0+BA\\) — zero extra latency</div>
<div class="fr"><span class="fl">Eckart-Young</span>Best rank-\\(r\\) approximation of \\(\\Delta W^*\\) is LoRA's update</div>
</div>`,
der:[
["Why B=0 at init","If B=0 then BA=0, so at initialisation ΔW=0 and the model behaves exactly as the pretrained model. This ensures stable training start."],
["Merged weights for inference","W_final=W_0+BA. At inference time, this can be precomputed: no extra cost vs the original model. The two low-rank matrices are 'merged' into the full weight matrix."],
["Rank-r approximation quality","If the true optimal ΔW* has SVD decomposition σ₁u₁v₁ᵀ+…, then the rank-r LoRA approximation has approximation error ‖ΔW*-ΔWᴸᴼᴿᴬ‖_F≥√(σᵣ₊₁²+…). If singular values decay fast (low intrinsic rank), the error is small."],
["Why α/r scaling","The initialisation variance scales with r (sum of r terms). Dividing by r ensures the effective learning rate doesn't scale with r, making hyperparameter transfer across ranks easier."]
],
code:`import numpy as np

class LoRALayer:
    def __init__(self, d_in, d_out, rank=4, alpha=8):
        self.W0 = np.random.randn(d_out, d_in) * 0.02  # pretrained (frozen)
        self.A = np.random.randn(rank, d_in) * 0.01    # trainable
        self.B = np.zeros((d_out, rank))               # init to zero!
        self.rank = rank
        self.alpha = alpha
        self.scale = alpha / rank

    def forward(self, x):
        # W = W0 + (alpha/r) * B @ A
        delta_W = self.scale * (self.B @ self.A)
        return (self.W0 + delta_W) @ x

    def merge(self):
        return self.W0 + self.scale * (self.B @ self.A)

    def param_count(self):
        d_out, d_in = self.W0.shape
        return {"W0": d_out * d_in, "LoRA": self.rank * (d_out + d_in)}

# Example
layer = LoRALayer(d_in=512, d_out=512, rank=8, alpha=16)
x = np.random.randn(512)
out = layer.forward(x)
print("Output shape:", out.shape)

params = layer.param_count()
print(f"W0 params: {params['W0']:,}")
print(f"LoRA params: {params['LoRA']:,}")
print(f"Reduction: {1 - params['LoRA']/params['W0']:.1%}")

# Low-rank approximation of a weight update
d = 256
Delta_W_true = np.random.randn(d, d)
# Eckart-Young: best rank-r approx
r = 8
U, s, Vt = np.linalg.svd(Delta_W_true)
Delta_W_approx = U[:, :r] @ np.diag(s[:r]) @ Vt[:r, :]
error = np.linalg.norm(Delta_W_true - Delta_W_approx, 'fro')
total = np.linalg.norm(Delta_W_true, 'fro')
print(f"Rank-{r} approximation captures {1-error/total:.1%} of ΔW")`,
diag:`<svg viewBox="0 0 420 160" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:420px;border-radius:7px"><rect width="420" height="160" fill="#0d1117"/><text x="12" y="16" fill="#8b949e" font-size="10">LoRA: W = W₀ (frozen) + (α/r)·B·A (trainable, rank r)</text><rect x="10" y="28" width="80" height="80" fill="rgba(88,166,255,.08)" rx="5" stroke="#58a6ff"/><text x="50" y="72" fill="#58a6ff" font-size="11" text-anchor="middle">W₀</text><text x="50" y="90" fill="#8b949e" font-size="8" text-anchor="middle">d×d (frozen)</text><text x="100" y="72" fill="#8b949e" font-size="14">+</text><rect x="115" y="44" width="24" height="80" fill="rgba(240,136,62,.15)" rx="3" stroke="#f0883e"/><text x="127" y="88" fill="#f0883e" font-size="8" text-anchor="middle">B</text><text x="127" y="102" fill="#8b949e" font-size="7" text-anchor="middle">d×r</text><rect x="140" y="56" width="60" height="24" fill="rgba(63,185,80,.15)" rx="3" stroke="#3fb950"/><text x="170" y="72" fill="#3fb950" font-size="8" text-anchor="middle">A</text><text x="170" y="86" fill="#8b949e" font-size="7" text-anchor="middle">r×d</text><text x="212" y="72" fill="#8b949e" font-size="14">=</text><rect x="226" y="28" width="80" height="80" fill="rgba(163,113,247,.08)" rx="5" stroke="#a371f7"/><text x="266" y="72" fill="#a371f7" font-size="11" text-anchor="middle">ΔW</text><text x="266" y="90" fill="#8b949e" font-size="8" text-anchor="middle">rank ≤ r</text><rect x="320" y="28" width="90" height="115" fill="#161b22" rx="5" stroke="#30363d"/><text x="365" y="46" fill="#8b949e" font-size="9" text-anchor="middle">Param count</text><text x="330" y="64" fill="#8b949e" font-size="8">W₀: d²</text><text x="330" y="80" fill="#3fb950" font-size="8">LoRA: 2rd</text><text x="330" y="96" fill="#f0883e" font-size="8">Ratio: d/(2r)</text><text x="330" y="116" fill="#8b949e" font-size="8">d=4096,r=8:</text><text x="330" y="130" fill="#3fb950" font-size="8">256× smaller!</text></svg>`,

dd:`<div class="ddw"><h3>Beyond LoRA: DoRA, QLoRA, and Adapters</h3><p>LoRA is the foundation of a family of PEFT methods. <strong>QLoRA</strong> (Dettmers et al. 2023) quantises the frozen weights W₀ to 4-bit NF4 format while keeping LoRA adapters in bfloat16, enabling fine-tuning of 65B parameter models on a single 48GB GPU. <strong>DoRA</strong> (Liu et al. 2024) decomposes weight updates into magnitude and direction components, applying LoRA to the direction only. <strong>Adapters</strong> insert small bottleneck MLP modules between transformer layers rather than modifying existing weights. All exploit the same core idea: the space of task-relevant updates is low-dimensional, and you can characterise it without touching the (expensive) pre-trained weights.</p></div>`
},

{t:6,n:1,title:"Limits & Continuity",
ai:"The gradient of a neural network loss is defined via limits (derivatives are limits of difference quotients). The softmax function is continuous; its stability trick (subtracting the max) exploits limit properties. Understanding \\(\\lim_{x\\to\\infty}\\) allows analysing what activation functions do in saturation.",
pe:"A <strong>limit</strong> \\(\\lim_{x\\to a}f(x)=L\\) means \\(f(x)\\) gets arbitrarily close to \\(L\\) as \\(x\\to a\\). <strong>Continuity</strong> means no jumps or holes: \\(\\lim_{x\\to a}f(x)=f(a)\\).",
int:"Imagine zooming in on a curve. If no matter how much you zoom, the function settles to a single value at a point, that's the limit. If the value equals the function's value there, it's continuous. Discontinuities are 'jumps' or 'gaps'.",
form:`<div class="fb">
<div class="fr"><span class="fl">Limit</span>\\(\\lim_{x\\to a}f(x)=L\\): for any \\(\\epsilon>0\\), \\(\\exists\\delta>0\\) s.t. \\(|x-a|<\\delta\\implies|f(x)-L|<\\epsilon\\)</div>
<div class="fr"><span class="fl">One-sided</span>Left: \\(\\lim_{x\\to a^-}\\); Right: \\(\\lim_{x\\to a^+}\\); limit exists iff both equal</div>
<div class="fr"><span class="fl">Continuity</span>\\(f\\) continuous at \\(a\\) iff \\(\\lim_{x\\to a}f(x)=f(a)\\)</div>
<div class="fr"><span class="fl">Limit laws</span>\\(\\lim(f\\pm g)=\\lim f\\pm\\lim g\\), \\(\\lim(fg)=(\\lim f)(\\lim g)\\)</div>
<div class="fr"><span class="fl">Squeeze</span>\\(g(x)\\leq f(x)\\leq h(x)\\) and \\(\\lim g=\\lim h=L\\implies\\lim f=L\\)</div>
</div>`,
der:[
["Important limit: \\(\\lim_{x\\to0}\\sin x/x=1\\)","Using squeeze theorem: \\(\\cos x\\leq\\sin x/x\\leq1\\). Both bounds →1 as x→0. So sin(x)/x→1. This limit underlies Taylor series for sin and Euler's formula."],
["Activation function limits","ReLU: \\(\\lim_{x\\to-\\infty}\\max(0,x)=0\\), \\(\\lim_{x\\to+\\infty}\\max(0,x)=+\\infty\\). Sigmoid: \\(\\sigma(x)=1/(1+e^{-x})\\to0\\) as x→-∞, →1 as x→+∞. Tanh: similar to sigmoid, range (-1,1)."],
["Softmax stability","\\(\\text{softmax}(\\mathbf{z})_i=e^{z_i}/\\sum_je^{z_j}\\). For large z_i, e^{z_i}→∞. Trick: subtract max: e^{z_i-M}/\\sum_je^{z_j-M} — same value by limit properties, but numerically stable."]
],
code:`import numpy as np

# Limit of sin(x)/x as x -> 0
x = np.array([0.1, 0.01, 0.001, 0.0001])
print("sin(x)/x:", np.sin(x)/x)   # approaches 1

# Sigmoid and its limits
def sigmoid(x): return 1 / (1 + np.exp(-x))
x_vals = np.array([-100., -10., -1., 0., 1., 10., 100.])
print("sigmoid:", sigmoid(x_vals))

# Numerically stable softmax
def softmax_naive(z):
    return np.exp(z) / np.sum(np.exp(z))

def softmax_stable(z):
    z = z - np.max(z)    # subtract max: same limit
    return np.exp(z) / np.sum(np.exp(z))

z = np.array([1000., 2., 3.])
try: print("naive:", softmax_naive(z))
except: print("naive: overflow!")
print("stable:", softmax_stable(z))

# Continuity check for ReLU
def relu(x): return np.maximum(0, x)
x = np.linspace(-0.01, 0.01, 1000)
print("ReLU continuous at 0?", np.allclose(relu(x[500]), 0))  # True`,

dd:`<div class="ddw"><h3>The ε-δ Definition in Practice</h3><p>The formal ε-δ definition of a limit is rarely used directly in ML, but it underlies all of calculus. The key insight: a limit says nothing about what happens AT a point — only what happens NEAR it. This matters for subgradients of non-differentiable functions like ReLU: at x=0, the function is continuous (the limit exists) but not differentiable (left and right derivatives differ). In practice, frameworks like PyTorch make an arbitrary choice (usually 0 or 1) for the subgradient at non-differentiable points. The limit definition also underlies the rigorous notion of what it means for a sequence of model parameters to converge to a minimum.</p></div>`

pe:"The <strong>derivative</strong> \\(f'(x)\\) measures the instantaneous rate of change of \\(f\\) at \\(x\\). It equals the slope of the tangent line. The rules (power, product, quotient, chain) let you differentiate any composition of elementary functions.",
int:"The derivative answers 'if I nudge x by a tiny bit ε, how much does f(x) change?' The answer is f'(x)·ε. If f'(x)=3, nudging x by ε changes f by 3ε. Differentiation rules are shortcuts for computing this without taking the limit directly.",
form:`<div class="fb">
<div class="fr"><span class="fl">Definition</span>\\(f'(x)=\\lim_{h\\to0}\\dfrac{f(x+h)-f(x)}{h}\\)</div>

["Deriving power rule","\\(\\frac{d}{dx}x^n=\\lim_{h\\to0}\\frac{(x+h)^n-x^n}{h}\\). Binomial expansion: \\((x+h)^n=x^n+nx^{n-1}h+O(h^2)\\). So \\((x^n-x^n+nx^{n-1}h+O(h^2))/h=nx^{n-1}+O(h)\\to nx^{n-1}\\). ✓"],
["Product rule derivation","\\((fg)'=\\lim_{h\\to0}\\frac{f(x+h)g(x+h)-f(x)g(x)}{h}\\). Add and subtract f(x)g(x+h): \\(=\\lim_{h\\to0}[\\frac{f(x+h)-f(x)}{h}g(x+h)+f(x)\\frac{g(x+h)-g(x)}{h}]\\). As h→0: \\(f'(x)g(x)+f(x)g'(x)\\). ✓"],
["Chain rule derivation","\\((f(g(x)))' = \\lim_{h\\to0}\\frac{f(g(x+h))-f(g(x))}{h}\\). Let \\(\\Delta g=g(x+h)-g(x)\\). Then \\(=\\lim_{h\\to0}\\frac{f(g(x)+\\Delta g)-f(g(x))}{\\Delta g}\\cdot\\frac{\\Delta g}{h}\\to f'(g(x))\\cdot g'(x)\\). ✓"]

code:`import numpy as np

# Numerical derivative (finite difference)
def numerical_grad(f, x, h=1e-5):
    return (f(x+h) - f(x-h)) / (2*h)   # central difference

# Test power rule: d/dx x^3 = 3x^2
f = lambda x: x**3
x = 2.0
print("Power rule analytic:", 3*x**2)       # 12
print("Numerical:          ", numerical_grad(f, x))  # 12.0

# Product rule: d/dx [sin(x) * x^2]
g = lambda x: np.sin(x) * x**2
analytic = lambda x: np.cos(x)*x**2 + np.sin(x)*2*x
x = 1.0
print("Product rule analytic:", analytic(x).round(6))
print("Numerical:            ", numerical_grad(g, x).round(6))

# Chain rule: d/dx sigma(x^2)
def sigma(z): return 1 / (1 + np.exp(-z))
def dsigma(z): return sigma(z) * (1 - sigma(z))  # σ(1-σ)

h = lambda x: sigma(x**2)
# Chain rule: h'(x) = sigma'(x^2) * 2x
chain = lambda x: dsigma(x**2) * 2*x
x = 0.5
print("Chain rule analytic:", chain(x).round(6))
print("Numerical:          ", numerical_grad(h, x).round(6))`,

dd:`<div class="ddw"><h3>Automatic Differentiation vs Numerical Differentiation</h3><p>Numerical differentiation (finite differences \\((f(x+h)-f(x-h))/(2h)\\)) is simple but has two problems: (1) it requires \\(O(n)\\) function evaluations to compute an \\(n\\)-dimensional gradient, and (2) there's a fundamental trade-off between truncation error (decreasing h) and round-off error (floating point precision as h→0). Automatic differentiation (autodiff) avoids both: it computes exact symbolic derivatives using the chain rule, at cost \\(O(1)\\) of forward passes (for reverse-mode / backprop). This is why PyTorch's <code>torch.autograd</code> can compute gradients of millions of parameters in a single backward pass.</p></div>`
},

ai:"Backpropagation IS the chain rule applied to a computational graph. Every time PyTorch calls <code>.backward()</code>, it traverses the graph in reverse, multiplying Jacobians. Understanding backprop as chain rule lets you derive gradients for custom layers, understand gradient flow, and debug vanishing/exploding gradients.",
pe:"The <strong>chain rule</strong> for composed functions: \\((f(g(x)))'=f'(g(x))\\cdot g'(x)\\). <strong>Backpropagation</strong> applies this to neural networks: to compute \\(\\partial L/\\partial w\\), multiply local derivatives along the path from \\(L\\) back to \\(w\\).",
int:"Imagine a chain of workers: \\(w\\to x\\to y\\to L\\). Each worker can say 'for a unit change in my input, my output changes by k'. Backprop asks 'how does L change with w?' by multiplying all the local ratios along the chain. This is the chain rule.",
form:`<div class="fb">
<div class="fr"><span class="fl">Chain rule</span>\\(\\frac{dL}{dw}=\\frac{dL}{dy}\\cdot\\frac{dy}{dx}\\cdot\\frac{dx}{dw}\\)</div>
<div class="fr"><span class="fl">Forward pass</span>Compute \\(x,y,L\\) from \\(w\\) (store intermediate values)</div>
<div class="fr"><span class="fl">Backward pass</span>Compute \\(\\partial L/\\partial\\cdot\\) in reverse, multiplying local gradients</div>
<div class="fr"><span class="fl">Upstream grad</span>\\(\\delta=\\partial L/\\partial z\\) passed from next layer</div>
<div class="fr"><span class="fl">Local grad</span>\\(\\partial z/\\partial w\\) computed from this layer's formula</div>
</div>`,
der:[
["Backprop for a single layer","Layer: z=Wx+b, a=σ(z), L=cross_entropy(a,y). ∂L/∂a computed by loss layer. ∂a/∂z=σ'(z). ∂z/∂W=x. By chain rule: ∂L/∂W=(∂L/∂a)·(∂a/∂z)·(∂z/∂W)=δ_a·σ'(z)·x^T."],
["Vanishing gradients","If σ'(z)=σ(z)(1-σ(z))∈[0,0.25], each sigmoid layer multiplies the gradient by at most 0.25. With 10 layers: gradient shrinks by 0.25^{10}≈10^{-6}. ReLU (σ'=1 for x>0) fixes this by passing gradients unchanged."],
["ReLU backward","Forward: a=max(0,z). Backward: ∂a/∂z=1 if z>0, else 0. Gradient 'gates': if the neuron was active, gradient passes through unchanged; if inactive, gradient is zeroed (dead neuron problem)."]
],
code:`import numpy as np

# Manual backprop for a tiny net: x -> z=Wx -> a=relu(z) -> L=0.5||a-y||^2
def relu(z): return np.maximum(0, z)
def relu_grad(z): return (z > 0).astype(float)

x = np.array([1., 2., 3.])
y = np.array([0., 1.])
W = np.random.randn(2, 3) * 0.1

# Forward pass
z = W @ x
a = relu(z)
L = 0.5 * np.sum((a - y)**2)
print(f"Loss: {L:.4f}")

# Backward pass (chain rule)
dL_da = a - y                   # gradient of MSE
da_dz = relu_grad(z)            # local grad of ReLU
dz_dW = x[np.newaxis, :]        # (1, 3) — local grad of z=Wx
dL_dz = dL_da * da_dz          # element-wise (chain rule)
dL_dW = dL_dz[:, np.newaxis] * dz_dW  # outer product (2,3)

print("Gradient dL/dW shape:", dL_dW.shape)
print("Gradient dL/dW:\n", dL_dW.round(4))

# Verify with finite differences
eps = 1e-5
dL_dW_num = np.zeros_like(W)
for i in range(W.shape[0]):
    for j in range(W.shape[1]):
        Wp = W.copy(); Wp[i,j] += eps
        Wm = W.copy(); Wm[i,j] -= eps
        Lp = 0.5*np.sum((relu(Wp@x)-y)**2)
        Lm = 0.5*np.sum((relu(Wm@x)-y)**2)
        dL_dW_num[i,j] = (Lp - Lm)/(2*eps)
print("Max diff:", np.max(np.abs(dL_dW - dL_dW_num)))`,

dd:`<div class="ddw"><h3>Reverse-Mode vs Forward-Mode Autodiff</h3><p>There are two modes of automatic differentiation. <strong>Forward mode</strong> propagates a 'tangent vector' dx alongside the computation, computing one column of the Jacobian per forward pass. Cost: O(n) passes for n inputs. <strong>Reverse mode</strong> (backprop) propagates a 'cotangent vector' (∂L/∂z) backward, computing one row of the Jacobian per backward pass. Cost: O(m) backward passes for m outputs. For neural networks with n=millions of parameters and m=1 (scalar loss), reverse mode is O(1) backward passes — one full gradient computation. This asymmetry (n≫m=1) is why backpropagation is the algorithm of choice for deep learning.</p></div>`
},
{t:6,n:4,title:"Partial Derivatives & Gradients",
ai:"The gradient \\(\\nabla_\\theta\\mathcal{L}\\) is the vector of partial derivatives — the direction of steepest ascent. Every gradient descent update uses the gradient. The gradient of a matrix function with respect to its weight matrix (a partial derivative) is how we derive the update rule for each layer.",
pe:"A <strong>partial derivative</strong> \\(\\partial f/\\partial x_i\\) measures the rate of change of \\(f\\) when only \\(x_i\\) changes and all other variables are held fixed. The <strong>gradient</strong> \\(\\nabla f\\) collects all partial derivatives into a vector pointing in the direction of steepest increase.",
int:"The gradient is a compass that points uphill. In gradient descent, we negate it to go downhill. Each partial derivative tells you: 'if I change just this parameter a little, how much does the loss change?' The gradient stacks all these answers into a single vector.",
form:`<div class="fb">
<div class="fr"><span class="fl">Partial deriv.</span>\\(\\frac{\\partial f}{\\partial x_i}=\\lim_{h\\to0}\\frac{f(x_1,\\ldots,x_i+h,\\ldots,x_n)-f(x_1,\\ldots,x_n)}{h}\\)</div>

code:`import numpy as np

# Partial derivatives: f(x,y) = x^2 * y + sin(y)
def f(xy):
    x, y = xy
    return x**2 * y + np.sin(y)

def grad_f(xy):
    x, y = xy
    df_dx = 2*x*y
    df_dy = x**2 + np.cos(y)
    return np.array([df_dx, df_dy])

xy = np.array([2., 1.])
print("Gradient:", grad_f(xy))

# Numerical gradient check
def numerical_gradient(f, x, h=1e-5):
    grad = np.zeros_like(x, dtype=float)
    for i in range(len(x)):
        x_plus = x.copy(); x_plus[i] += h
        x_minus = x.copy(); x_minus[i] -= h
        grad[i] = (f(x_plus) - f(x_minus)) / (2*h)
    return grad

print("Numerical:", numerical_gradient(f, xy))

# Gradient descent on f(x,y) = x^2 + y^2 (minimum at origin)
def grad_bowl(xy): return 2*xy

xy = np.array([3., -2.])
lr = 0.1
for step in range(20):
    xy -= lr * grad_bowl(xy)
print(f"After 20 steps: xy={xy.round(4)}")  # close to [0,0]

W = np.random.randn(3)

code:`import numpy as np

# Jacobian of f(x) = [x1^2, x1*x2, sin(x2)]
def f(x):
    x1, x2 = x
    return np.array([x1**2, x1*x2, np.sin(x2)])

def jacobian_numerical(f, x, h=1e-5):
    m = len(f(x))
    n = len(x)
    J = np.zeros((m, n))
    for j in range(n):
        x_plus = x.copy(); x_plus[j] += h
        x_minus = x.copy(); x_minus[j] -= h
        J[:, j] = (f(x_plus) - f(x_minus)) / (2*h)
    return J

x = np.array([2., 1.])
J = jacobian_numerical(f, x)
print("Jacobian:\n", J.round(4))
# Analytic: [[2x1, 0], [x2, x1], [0, cos(x2)]]
J_analytic = np.array([[2*x[0], 0],
                        [x[1], x[0]],
                        [0, np.cos(x[1])]])
print("Match:", np.allclose(J, J_analytic, atol=1e-4))

# Hessian of f(x1,x2) = x1^2 + x1*x2 + x2^2
def hessian_numerical(f, x, h=1e-4):
    n = len(x)
    H = np.zeros((n, n))
    for i in range(n):
        for j in range(n):
            x_pp = x.copy(); x_pp[i]+=h; x_pp[j]+=h
            x_pm = x.copy(); x_pm[i]+=h; x_pm[j]-=h
            x_mp = x.copy(); x_mp[i]-=h; x_mp[j]+=h
            x_mm = x.copy(); x_mm[i]-=h; x_mm[j]-=h
            H[i,j] = (f(x_pp)-f(x_pm)-f(x_mp)+f(x_mm))/(4*h**2)
    return H

g = lambda x: x[0]**2 + x[0]*x[1] + x[1]**2
x0 = np.array([1., 2.])
H = hessian_numerical(g, x0)
print("Hessian:\n", H.round(4))
# Analytic: [[2, 1], [1, 2]]
print("Eigenvalues (sharpness):", np.linalg.eigvalsh(H))`,

dd:`<div class="ddw"><h3>Quasi-Newton Methods: BFGS and L-BFGS</h3><p>Full Newton's method requires O(n²) memory to store H and O(n³) to invert it — infeasible for n=millions. Quasi-Newton methods build an approximation Hₖ≈H using only gradient differences, without explicitly computing the Hessian. BFGS updates Hₖ with a rank-2 update per step. L-BFGS (Limited-memory BFGS) stores only the last m≈10 gradient difference vectors and reconstructs H⁻¹ implicitly, using O(mn) memory. L-BFGS is the standard choice for full-batch training of medium-scale models and is used internally by SciPy's <code>optimize.minimize(method='L-BFGS-B')</code>.</p></div>`

code:`import numpy as np

# Taylor series for exp(x)
def exp_taylor(x, n_terms=10):
    result = 0
    factorial = 1
    x_power = 1
    for n in range(n_terms):
        if n > 0:
            factorial *= n
            x_power *= x
        else:
            factorial = 1
            x_power = 1
        result += x_power / factorial
    return result

x = 0.5
print(f"Taylor exp({x}) (10 terms):", exp_taylor(x, 10))
print(f"True exp({x}):              ", np.exp(x))

# Multivariate Taylor: f(x+d) ≈ f(x) + grad·d + 0.5·d·H·d
def f(x): return x[0]**2 + x[1]**2

x0 = np.array([1., 1.])
d  = np.array([0.1, -0.05])
grad = 2*x0              # [2, 2]
H    = 2*np.eye(2)       # [[2,0],[0,2]]

# True vs Taylor approximation
f_true   = f(x0 + d)
f_taylor = f(x0) + grad @ d + 0.5 * d @ H @ d
print(f"f(x0+d) true:   {f_true:.6f}")
print(f"f(x0+d) Taylor: {f_taylor:.6f}")

# GELU approximation
def gelu_approx(x):
    return 0.5*x*(1+np.tanh(np.sqrt(2/np.pi)*(x+0.044715*x**3)))

def gelu_exact(x):
    return x*0.5*(1+erf(x/np.sqrt(2)))

x = np.linspace(-3, 3, 100)

dd:`<div class="ddw"><h3>Neural Tangent Kernel (NTK)</h3><p>At initialisation, a neural network with weights θ₀ can be linearised via its first-order Taylor expansion: f(x;θ)≈f(x;θ₀)+∇_θf(x;θ₀)ᵀ(θ-θ₀). For infinitely wide networks, this linearisation becomes exact throughout training (Jacot et al. 2018): the network behaves like a kernel regression with kernel K(x,x')=∇_θf(x;θ₀)ᵀ∇_θf(x';θ₀) — the Neural Tangent Kernel. This allowed the first rigorous analysis of neural network training dynamics, explaining why wide networks can fit any data and how width affects convergence. Modern understanding of feature learning (non-NTK regime) focuses on how practical networks escape the linear regime.</p></div>`
